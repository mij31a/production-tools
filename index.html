// ─── Storage Layer (localStorage + GAS sync) ───
const SK = "puwan-factory-v2";
const GAS_URL_KEY = "puwan-factory-gas-url";

const storage = {
  get(key) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch { return null; } },
  set(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} },
  remove(key) { try { localStorage.removeItem(key); } catch {} },
};

async function gasGet(url) {
  const res = await fetch(url, { redirect: "follow" });
  const json = await res.json();
  if (json.success && json.data) return json.data;
  return null;
}
async function gasPost(url, data) {
  await fetch(url, { method: "POST", redirect: "follow", headers: { "Content-Type": "text/plain" }, body: JSON.stringify({ action: "save", data }) });
}
function gasSyncSave(data) {
  try {
    const url = storage.get(GAS_URL_KEY);
    if (url) gasPost(url, data).catch(() => {});
  } catch {}
}

// ─── Helpers ───
function getPhaseProgress(ep, phaseId) {
  const ph = PHASES.find(p => p.id === phaseId);
  if (!ph) return { done: 0, total: 0 };
  if (ph.unit === "batch") return { done: ep.done[phaseId] ? 1 : 0, total: 1 };
  const total = ep.panels.length;
  const done = ep.panels.filter(p => ep.done[phaseId + ":" + p.id]).length;
  return { done, total };
}

function isEpAllDone(ep) {
  return PHASES.every(ph => {
    const { done, total } = getPhaseProgress(ep, ph.id);
    return done >= total;
  });
}

function getNextTask(ep) {
  for (const ph of PHASES) {
    if (ph.unit === "batch") {
      if (!ep.done[ph.id]) return { key: ph.id, phase: ph, panelId: null, panelLabel: null };
    } else {
      for (const panel of ep.panels) {
        const key = ph.id + ":" + panel.id;
        if (!ep.done[key]) return { key, phase: ph, panelId: panel.id, panelLabel: panel.label };
      }
    }
  }
  return null;
}

function countAllDone(ep) {
  let done = 0, total = 0;
  PHASES.forEach(ph => {
    if (ph.unit === "batch") { total++; if (ep.done[ph.id]) done++; }
    else { ep.panels.forEach(p => { total++; if (ep.done[ph.id + ":" + p.id]) done++; }); }
  });
  return { done, total };
}

function totalSeconds(ep) {
  return Object.values(ep.seconds || {}).reduce((s, v) => s + v, 0);
}

function calcStreak(activeDays) {
  if (!activeDays || activeDays.length === 0) return 0;
  const sorted = [...activeDays].sort().reverse();
  const today = new Date().toISOString().slice(0, 10);
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  if (sorted[0] !== today && sorted[0] !== yesterday) return 0;
  let streak = 1;
  for (let i = 0; i < sorted.length - 1; i++) {
    const diff = (new Date(sorted[i]) - new Date(sorted[i + 1])) / 86400000;
    if (diff === 1) streak++;
    else break;
  }
  return streak;
}

function calcMaxStreak(activeDays) {
  if (!activeDays || activeDays.length === 0) return 0;
  const sorted = [...new Set(activeDays)].sort();
  let max = 1, cur = 1;
  for (let i = 1; i < sorted.length; i++) {
    const diff = (new Date(sorted[i]) - new Date(sorted[i - 1])) / 86400000;
    if (diff === 1) { cur++; max = Math.max(max, cur); }
    else { cur = 1; }
  }
  return max;
}

function fmtTime(s) {
  if (!s || s <= 0) return "—";
  if (s < 60) return s + "秒";
  const m = Math.floor(s / 60), sec = s % 60;
  if (m < 60) return m + "分" + (sec > 0 ? sec + "秒" : "");
  return Math.floor(m / 60) + "時間" + (m % 60) + "分";
}
function fmtTimer(s) {
  const m = Math.floor(s / 60), sec = s % 60;
  return String(m).padStart(2, "0") + ":" + String(sec).padStart(2, "0");
}

// ─── Component ───
function PuwanFactory() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [activeEp, setActiveEp] = useState(null);
  const [working, setWorking] = useState(null);
  const [elapsed, setElapsed] = useState(0);
  const [puwanMsg, setPuwanMsg] = useState("");
  const [combo, setCombo] = useState(0);
  const [lastDoneAt, setLastDoneAt] = useState(null);
  const [showConfetti, setShowConfetti] = useState(false);
  const [celebration, setCelebration] = useState(null);
  const [todayStats, setTodayStats] = useState({ panels: 0, seconds: 0, date: "" });
  const [addingEp, setAddingEp] = useState(false);
  const [newTitle, setNewTitle] = useState("");
  const [newPanelCount, setNewPanelCount] = useState(7);
  const [editingEp, setEditingEp] = useState(null);
  const [showPaste, setShowPaste] = useState(false);
  const [pasteText, setPasteText] = useState("");
  const [showGoalEdit, setShowGoalEdit] = useState(false);
  const [goalDateInput, setGoalDateInput] = useState("");
  const [goalCountInput, setGoalCountInput] = useState(5);
  const [showAchievements, setShowAchievements] = useState(false);
  const [newAchievement, setNewAchievement] = useState(null); // toast
  const [tab, setTab] = useState("work"); // "work" | "stats"
  const [showSettings, setShowSettings] = useState(false);
  const [gasUrl, setGasUrl] = useState(() => storage.get(GAS_URL_KEY) || "");
  const [gasStatus, setGasStatus] = useState("");
  const [syncing, setSyncing] = useState(false);
  const timerRef = useRef(null);
  const comboRef = useRef(null);

  // Load from localStorage, then auto-sync from GAS
  useEffect(() => {
    const today = new Date().toISOString().slice(0, 10);

    function applyData(d) {
      setData(d);
      setTodayStats(d.todayStats?.date === today ? d.todayStats : { panels: 0, seconds: 0, date: today });
      const lastActive = d.lastActiveDate;
      if (lastActive) {
        const daysSince = Math.round((new Date(today) - new Date(lastActive)) / 86400000);
        if (daysSince >= 3) setPuwanMsg(rMsg("welcomeBack"));
        else if (daysSince >= 1) setPuwanMsg(rMsg("welcomeNextDay"));
        else setPuwanMsg(rMsg("idle"));
      } else { setPuwanMsg(rMsg("idle")); }
    }

    // 1. Load local first (instant)
    try {
      const saved = storage.get(SK);
      if (saved && saved.episodes) { applyData(saved); }
      else { setData({ episodes: DEFAULT_EPS }); setTodayStats({ panels: 0, seconds: 0, date: today }); setPuwanMsg(rMsg("idle")); }
    } catch {
      setData({ episodes: DEFAULT_EPS }); setTodayStats({ panels: 0, seconds: 0, date: today }); setPuwanMsg(rMsg("idle"));
    }
    setLoading(false);

    // 2. Then try GAS in background (if URL set)
    try {
      const gasUrlStored = storage.get(GAS_URL_KEY);
      if (gasUrlStored) {
        gasGet(gasUrlStored).then(remote => {
          if (remote && remote.episodes) {
            // Use GAS data if it has more recent activity
            const local = storage.get(SK);
            const localDate = local?.lastActiveDate || "";
            const remoteDate = remote.lastActiveDate || "";
            if (remoteDate >= localDate || !local?.episodes) {
              storage.set(SK, remote);
              applyData(remote);
            }
          }
        }).catch(() => {});
      }
    } catch {}
  }, []);

  // Save
  const save = useCallback(async (d, stats) => {
    const s = stats || todayStats;
    setData(d); if (stats) setTodayStats(stats);
    try { storage.set(SK, { ...d, todayStats: s }); gasSyncSave({ ...d, todayStats: s }); } catch {}
  }, [todayStats]);

  function saveGasUrl(url) { setGasUrl(url); storage.set(GAS_URL_KEY, url); }
  async function pullFromGas() {
    if (!gasUrl) { setGasStatus("URLが未設定"); return; }
    setSyncing(true); setGasStatus("");
    try {
      const remote = await gasGet(gasUrl);
      if (remote && remote.episodes) { save(remote, remote.todayStats); setGasStatus("取得完了！"); }
      else { setGasStatus("リモートにデータなし"); }
    } catch(e) { setGasStatus("取得失敗"); }
    setSyncing(false);
  }
  async function pushToGas() {
    if (!gasUrl) { setGasStatus("URLが未設定"); return; }
    setSyncing(true); setGasStatus("");
    try { await gasPost(gasUrl, { ...data, todayStats }); setGasStatus("送信完了！"); }
    catch(e) { setGasStatus("送信失敗"); }
    setSyncing(false);
  }

  // Record activity (called on any task completion)
  function recordActivity(d, isTimerTask) {
    const today = new Date().toISOString().slice(0, 10);
    const hour = new Date().getHours();
    const activeDays = [...new Set([...(d.activeDays || []), today])];
    const lastActive = d.lastActiveDate || "";
    const daysSinceLast = lastActive ? Math.round((new Date(today) - new Date(lastActive)) / 86400000) : 0;
    const hasComeback = d.hasComeback || daysSinceLast >= 3;
    const totalCompleted = (d.totalCompleted || 0) + 1;
    const maxStreak = calcMaxStreak(activeDays);
    const nightOwl = d.nightOwl || hour >= 23;
    const earlyBird = d.earlyBird || hour < 7;
    const todayTasks = (d.todayStats?.date === today ? (d.todayStats?.panels || 0) : 0) + 1;
    const maxDailyTasks = Math.max(d.maxDailyTasks || 0, todayTasks);

    return { ...d, activeDays, lastActiveDate: today, totalCompleted, maxStreak, hasComeback, nightOwl, earlyBird, maxDailyTasks };
  }

  function checkNewAchievements(d) {
    const unlocked = d.unlockedAchievements || [];
    for (const ach of ACHIEVEMENTS) {
      if (!unlocked.includes(ach.id) && ach.check(d)) {
        const newUnlocked = [...unlocked, ach.id];
        setNewAchievement(ach);
        setTimeout(() => setNewAchievement(null), 2000);
        return { ...d, unlockedAchievements: newUnlocked };
      }
    }
    return d;
  }

  // Timer
  useEffect(() => {
    if (working) { timerRef.current = setInterval(() => setElapsed(e => e + 1), 1000); }
    else { clearInterval(timerRef.current); }
    return () => clearInterval(timerRef.current);
  }, [working]);

  function startWork(epId, task) {
    setWorking({ epId, key: task.key, phase: task.phase, panelLabel: task.panelLabel });
    setElapsed(0); setPuwanMsg(rMsg("start")); setActiveEp(epId);
  }

  function completeWork() {
    if (!working || !data) return;
    const { epId, key } = working;
    const now = Date.now();
    const sinceLastDone = lastDoneAt ? (now - lastDoneAt) / 1000 : 999;
    const newEps = data.episodes.map(ep => {
      if (ep.id !== epId) return ep;
      const updated = { ...ep, done: { ...ep.done, [key]: true }, seconds: { ...ep.seconds, [key]: (ep.seconds[key] || 0) + elapsed } };
      updated.allDone = isEpAllDone(updated);
      return updated;
    });
    const ep = newEps.find(e => e.id === epId);
    const phaseId = key.split(":")[0];
    const { done: phD, total: phT } = getPhaseProgress(ep, phaseId);
    const phaseComplete = phD >= phT;
    const epComplete = ep.allDone;
    let newCombo = sinceLastDone < 300 ? combo + 1 : 1;
    setCombo(newCombo); setLastDoneAt(now);
    clearTimeout(comboRef.current);
    comboRef.current = setTimeout(() => setCombo(0), 300000);
    if (epComplete) { setPuwanMsg(rMsg("epDone")); setCelebration("episode"); setShowConfetti(true); setTimeout(() => { setShowConfetti(false); setCelebration(null); }, 1800); }
    else if (phaseComplete) { setPuwanMsg(rMsg("phaseDone")); setCelebration("phase"); setTimeout(() => setCelebration(null), 1500); }
    else if (newCombo >= 3) { setPuwanMsg(rMsg("combo")); setShowConfetti(true); setTimeout(() => setShowConfetti(false), 800); }
    else { setPuwanMsg(rMsg("done1")); }
    const today = new Date().toISOString().slice(0, 10);
    const newStats = { panels: (todayStats.date === today ? todayStats.panels : 0) + 1, seconds: (todayStats.date === today ? todayStats.seconds : 0) + elapsed, date: today };
    setWorking(null); setElapsed(0);
    let updated = recordActivity({ ...data, episodes: newEps }, true);
    updated = checkNewAchievements(updated);
    save(updated, newStats);
  }

  function cancelWork() { setWorking(null); setElapsed(0); setPuwanMsg(rMsg("paused")); }

  // Mark done without timer (already completed work)
  function markDone(epId, taskKey) {
    const newEps = data.episodes.map(ep => {
      if (ep.id !== epId) return ep;
      const updated = { ...ep, done: { ...ep.done, [taskKey]: true } };
      updated.allDone = isEpAllDone(updated);
      return updated;
    });
    setPuwanMsg(rMsg("done1"));
    let updated = recordActivity({ ...data, episodes: newEps }, false);
    updated = checkNewAchievements(updated);
    save(updated);
  }

  function bulkCompletePhase(epId, phaseId) {
    const newEps = data.episodes.map(ep => {
      if (ep.id !== epId) return ep;
      const nd = { ...ep.done };
      ep.panels.forEach(p => { nd[phaseId + ":" + p.id] = true; });
      const u = { ...ep, done: nd }; u.allDone = isEpAllDone(u); return u;
    });
    const ep = newEps.find(e => e.id === epId);
    if (ep.allDone) {
      setPuwanMsg(rMsg("epDone")); setCelebration("episode"); setShowConfetti(true);
      setTimeout(() => { setShowConfetti(false); setCelebration(null); }, 1800);
    } else {
      setPuwanMsg(rMsg("phaseDone")); setCelebration("phase");
      setTimeout(() => setCelebration(null), 1500);
    }
    let updated = recordActivity({ ...data, episodes: newEps }, false);
    updated = checkNewAchievements(updated);
    save(updated);
  }

  function toggleTask(epId, taskKey) {
    const newEps = data.episodes.map(ep => {
      if (ep.id !== epId) return ep;
      const nd = { ...ep.done }; nd[taskKey] = !nd[taskKey];
      const u = { ...ep, done: nd }; u.allDone = isEpAllDone(u); return u;
    });
    save({ ...data, episodes: newEps });
  }

  // ─── Script parser ───
  function parseScript(text) {
    const titleMatch = text.match(/^#\s*台本[：:]\s*[「『](.+?)[」』]/m);
    const snsMatch = text.match(/SNS表示タイトル[：:]\s*`(.+?)`/);
    const title = snsMatch?.[1] || titleMatch?.[1] || "";

    const panels = [];
    let currentPage = "";
    const lines = text.split("\n");

    for (const line of lines) {
      // Page header: ### ▼ PAGE 1（3コマ：...）
      const pageMatch = line.match(/###\s*▼\s*PAGE\s*(\d+)/i);
      if (pageMatch) {
        currentPage = "P" + pageMatch[1];
        continue;
      }
      // Panel: **【C1】大ゴマ（上段）** or **【C2】中ゴマ（下段右・先に読む）**
      const panelMatch = line.match(/\*\*【([A-Za-z]*\d+)】(.+?)\*\*/);
      if (panelMatch) {
        const cId = panelMatch[1];
        let desc = panelMatch[2].replace(/[（(].+?[）)]/g, "").trim();
        const label = currentPage ? `${currentPage}-${cId} ${desc}` : `${cId} ${desc}`;
        panels.push({ id: cId.toLowerCase() + "_" + panels.length, label: label.slice(0, 30) });
        continue;
      }
      // Omake section
      if (line.match(/^##\s*おまけ/)) {
        panels.push({ id: "omake_" + panels.length, label: "ラベルカード" });
      }
    }

    return { title, panels };
  }

  function importScript(text) {
    const { title, panels } = parseScript(text);
    if (!title && panels.length === 0) return;
    const id = "ep" + Date.now();
    const ep = {
      id,
      title: title || "無題",
      panels: panels.length > 0 ? panels : [{ id: "c1", label: "C1" }],
      done: {}, seconds: {}, allDone: false,
    };
    save({ ...data, episodes: [...data.episodes, ep] });
    setActiveEp(id);
    setAddingEp(false);
    setPuwanMsg("台本読み込んだよ！" + panels.length + "コマ検出…！");
  }

  function handleFileImport(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const text = ev.target.result;
      importScript(text);
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  function addEpisode() {
    if (!newTitle.trim()) return;
    const id = "ep" + Date.now();
    const panels = Array.from({ length: newPanelCount }, (_, i) => ({ id: "c" + (i + 1), label: "C" + (i + 1) }));
    save({ ...data, episodes: [...data.episodes, { id, title: newTitle.trim(), panels, done: {}, seconds: {}, allDone: false }] });
    setNewTitle(""); setNewPanelCount(7); setAddingEp(false);
  }

  function deleteEp(epId) { save({ ...data, episodes: data.episodes.filter(e => e.id !== epId) }); if (activeEp === epId) setActiveEp(null); }

  function renamePanelLabel(epId, panelId, label) {
    save({ ...data, episodes: data.episodes.map(ep => ep.id !== epId ? ep : { ...ep, panels: ep.panels.map(p => p.id === panelId ? { ...p, label } : p) }) });
  }
  function addPanel(epId) {
    save({ ...data, episodes: data.episodes.map(ep => ep.id !== epId ? ep : { ...ep, panels: [...ep.panels, { id: "c" + Date.now(), label: "C" + (ep.panels.length + 1) }] }) });
  }
  function removePanel(epId, panelId) {
    save({ ...data, episodes: data.episodes.map(ep => {
      if (ep.id !== epId) return ep;
      const nd = { ...ep.done }, ns = { ...ep.seconds };
      PHASES.forEach(ph => { if (ph.unit === "panel") { delete nd[ph.id + ":" + panelId]; delete ns[ph.id + ":" + panelId]; } });
      return { ...ep, panels: ep.panels.filter(p => p.id !== panelId), done: nd, seconds: ns };
    }) });
  }
  function saveGoal(targetDate, targetCount) {
    const startDate = data.goal?.startDate || new Date().toISOString().slice(0, 10);
    save({ ...data, goal: { targetDate, targetCount, startDate } });
    setShowGoalEdit(false);

  function clearGoal() {
    const nd = { ...data }; delete nd.goal;

  // ─── Pace calculation ───
  function calcPace(episodes, goal) {
    if (!goal || !goal.targetDate || !goal.targetCount) return null;
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const target = new Date(goal.targetDate);
    const targetCount = goal.targetCount;

    // Use goal creation or earliest incomplete ep as start reference
    const startDate = goal.startDate ? new Date(goal.startDate) : today;
    const spanDays = Math.max(1, Math.round((target - startDate) / 86400000));
    const totalDays = Math.max(0, Math.round((target - today) / 86400000));

    const doneCount = episodes.filter(e => e.allDone).length;
    const remaining = Math.max(0, targetCount - doneCount);

    if (remaining <= 0) return { status: "done", msg: "目標達成済み…！すごい！", color: "#4CAF50", milestones: [], doneCount, targetCount };

    // Milestones: evenly spaced across the full span
    const daysPerEp = spanDays / targetCount;
    const milestones = [];
    for (let i = 0; i < targetCount; i++) {
      const msDate = new Date(startDate.getTime() + daysPerEp * (i + 1) * 86400000);
      const epIndex = i; // 0-indexed, covers done + incomplete
      const incomplete = episodes.filter(e => !e.allDone);
      const allEpsOrdered = [...episodes.filter(e => e.allDone), ...incomplete];
      const ep = allEpsOrdered[i];
      const isDone = i < doneCount;
      milestones.push({
        epId: ep?.id || null,
        epTitle: ep?.title || "EP" + (i + 1),
        num: i + 1,
        date: msDate,
        dateStr: (msDate.getMonth() + 1) + "/" + msDate.getDate(),
        pct: Math.min(100, ((i + 1) / targetCount) * 100),
        isDone,
      });
    }

    // Today's position on the bar
    const todayPct = Math.min(100, Math.max(0, ((today - startDate) / (target - startDate)) * 100));

    // Pace evaluation
    const daysPerEpRemaining = totalDays > 0 ? totalDays / remaining : 0;
    let status, msg, color;
    if (totalDays <= 0) {
      status = "overdue"; msg = "期日を過ぎちゃった…でも、焦らなくてだいじょうぶ"; color = "#E88D67";
    } else if (daysPerEpRemaining < 2) {
      status = "tight"; msg = "ちょっと急ぎ足かも…でもできるよ"; color = "#E8B467";
    } else if (daysPerEpRemaining < 4) {
      status = "steady"; msg = "いいペースだよ…！このまま続けよう"; color = "#5EB5A0";
    } else {
      status = "relaxed"; msg = "余裕あるね！ていねいにいこう"; color = "#4CAF50";
    }

    return { status, msg, color, milestones, doneCount, targetCount, remaining, totalDays, todayPct, daysPerEp: Math.round(daysPerEpRemaining * 10) / 10 };
  }

                        <div style={{ padding: "8px 12px", borderRadius: 10, background: pace.color + "12", border: "1px solid " + pace.color + "33" }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                            <span style={{ fontSize: 14 }}>{pace.status === "overdue" ? "🫧" : pace.status === "tight" ? "📦💨" : pace.status === "steady" ? "📦✨" : "📦🌿"}</span>
                            <span style={{ fontSize: 12, color: pace.color, fontWeight: 600 }}>{pace.msg}</span>
                          </div>
                          <div style={{ fontSize: 10, color: "#9E9590", marginTop: 3 }}>
                            残り{pace.remaining}話 ・ 約{pace.daysPerEp}日/話ペースで間に合う
                          </div>
                        </div>
                      </div>
                    )}

                    <button style={{ background: "none", border: "none", color: "#D4A4A4", fontSize: 10, cursor: "pointer", marginTop: 6, fontFamily: "'M PLUS Rounded 1c',sans-serif" }}
                      onClick={clearGoal}>目標を解除</button>
                  </div>
                )}
              </div>
            );
          })()}

          {episodes.map((ep, ei) => {
            const { done: dc, total: dt } = countAllDone(ep);
            const pct = dt > 0 ? Math.round(dc / dt * 100) : 0;
            const isOpen = activeEp === ep.id;
            const isEdit = editingEp === ep.id;
            const next = getNextTask(ep);
            const secs = totalSeconds(ep);
            const timedCount = Object.values(ep.seconds || {}).filter(v => v > 0).length;
            const pace = calcPace(episodes, data.goal);
            const milestone = pace?.milestones?.find(m => m.epId === ep.id);

            return (
              <div key={ep.id} style={{ ...S.epCard, animation: `slideIn .25s ease ${ei * .04}s both` }}>
                <div style={S.epHead} onClick={() => setActiveEp(isOpen ? null : ep.id)}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{ ...S.epIco, background: ep.allDone ? "#E8F5E9" : pct > 0 ? "#FFF0F0" : "#F5F0EB" }}>{ep.allDone ? "✅" : "📦"}</div>
                    <div>
                      <div style={{ fontSize: 14, fontWeight: 700 }}>{ep.title}</div>
                      <div style={{ fontSize: 11, color: "#9E9590", marginTop: 1 }}>
                        {dc}/{dt}タスク
                        {secs > 0
                          ? <span style={{ marginLeft: 6, color: "#BDB5AC" }}>⏱{fmtTime(secs)}<span style={{ fontSize: 9, color: "#C8C0B8", marginLeft: 2 }}>({timedCount}/{dc}計測)</span></span>
                          : dc > 0 ? <span style={{ marginLeft: 6, fontSize: 10, color: "#C8C0B8" }}>計測なし</span> : null}
                        {milestone && !ep.allDone && <span style={{ marginLeft: 6, color: "#B0A090", fontSize: 10 }}>📅{milestone.dateStr}目安</span>}
                      </div>
                    </div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <span style={{ fontSize: 14, fontWeight: 800, color: ep.allDone ? "#4CAF50" : pct > 0 ? "#F2A7B0" : "#BDB5AC" }}>{ep.allDone ? "完了" : pct + "%"}</span>
                    <span style={{ fontSize: 12, color: "#BDB5AC", transform: isOpen ? "rotate(180deg)" : "none", transition: ".2s" }}>▼</span>
                  </div>
                </div>
                <div style={{ height: 3, background: "#F0EAE3", margin: "0 14px" }}><div style={{ height: "100%", width: `${pct}%`, background: ep.allDone ? "#B8E6C8" : "#F2A7B0", borderRadius: 2, transition: "width .5s" }} /></div>

                {isOpen && (
                  <div style={{ padding: "8px 14px 14px" }}>
                    {/* Quick start */}
                    {next && !isEdit && (
                      <button style={S.quickBtn} onClick={e => { e.stopPropagation(); startWork(ep.id, next); }}>
                        ▶ 次：{next.phase.icon} {next.phase.label}{next.panelLabel ? " → " + next.panelLabel : ""}
                      </button>
                    )}

                    {PHASES.map(ph => {
                      const prog = getPhaseProgress(ep, ph.id);
                      const phPct = prog.total > 0 ? Math.round(prog.done / prog.total * 100) : 0;
                      const allPh = prog.done >= prog.total;

                      return (
                        <div key={ph.id} style={{ marginBottom: 12 }}>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                            <span style={{ fontSize: 13, fontWeight: 700, color: allPh ? "#4CAF50" : "#5D534A" }}>
                              {ph.icon} {ph.label}<span style={{ fontSize: 10, color: "#BDB5AC", fontWeight: 400, marginLeft: 6 }}>{ph.desc}</span>
                            </span>
                            <span style={{ fontSize: 11, fontFamily: "'Share Tech Mono',monospace", color: allPh ? "#4CAF50" : "#BDB5AC" }}>{prog.done}/{prog.total}</span>
                          </div>
                          <div style={{ height: 4, background: "#F0EAE3", borderRadius: 2, overflow: "hidden", marginBottom: 6 }}>
                            <div style={{ height: "100%", borderRadius: 2, transition: "width .4s", width: `${phPct}%`, background: allPh ? "#B8E6C8" : ph.id.includes("color") ? "#A7D1E8" : "#F2A7B0" }} />
                          </div>

                          {ph.unit === "batch" && (
                            <div>
                              {ep.done[ph.id] ? (
                                <button style={S.taskDone} onClick={e => { e.stopPropagation(); toggleTask(ep.id, ph.id); }}>
                                  <span style={{ fontWeight: 800, fontSize: 14, color: "#4CAF50" }}>✓</span>
                                  <span style={{ color: "#9E9E9E" }}>完了{ep.seconds[ph.id] ? " (" + fmtTime(ep.seconds[ph.id]) + ")" : ""}</span>
                                </button>
                              ) : (
                                <div style={{ display: "flex", gap: 6 }}>
                                  <button style={{ ...S.taskPlay, flex: 1 }} onClick={e => { e.stopPropagation(); startWork(ep.id, { key: ph.id, phase: ph, panelId: null, panelLabel: null }); }}>
                                    <span style={{ color: "#F2A7B0", fontSize: 11 }}>▶</span> タイマーで処理
                                  </button>
                                  <button style={S.markDoneBtn} onClick={e => { e.stopPropagation(); markDone(ep.id, ph.id); }}>
                                    済
                                  </button>
                                </div>
                              )}
                            </div>
                          )}

                          {ph.unit === "panel" && (
                            <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                              {ep.panels.map(panel => {
                                const tKey = ph.id + ":" + panel.id;
                                const isDone = !!ep.done[tKey];
                                const sec = ep.seconds[tKey] || 0;

                                if (isEdit && ph.id === "color_char") {
                                  return (
                                    <div key={panel.id} style={{ display: "flex", gap: 4, marginBottom: 4 }}>
                                      <input style={S.editIn} value={panel.label} onChange={e => renamePanelLabel(ep.id, panel.id, e.target.value)} onClick={e => e.stopPropagation()} />
                                      <button style={S.editDel} onClick={e => { e.stopPropagation(); removePanel(ep.id, panel.id); }}>✕</button>
                                    </div>
                                  );
                                }

                                return (
                                  <div key={panel.id} style={{ display: "flex", gap: 0 }}>
                                    <button style={{ ...S.pBtn, flex: 1, background: isDone ? "#F0FAF2" : "#FFF", borderColor: isDone ? "#C8E6C9" : "#ECE5DD", borderRadius: isDone ? 8 : "8px 0 0 8px" }}
                                      onClick={e => { e.stopPropagation(); if (isDone) toggleTask(ep.id, tKey); else startWork(ep.id, { key: tKey, phase: ph, panelId: panel.id, panelLabel: panel.label }); }}>
                                      {isDone ? <span style={{ color: "#4CAF50", fontWeight: 800, fontSize: 12 }}>✓</span> : <span style={{ color: "#F2A7B0", fontSize: 10 }}>▶</span>}
                                      <span style={{ fontWeight: 600, fontSize: 11, color: isDone ? "#9E9E9E" : "#5D534A", textDecoration: isDone ? "line-through" : "none" }}>{panel.label}</span>
                                      {sec > 0 && <span style={{ fontSize: 9, color: "#BDB5AC", fontFamily: "'Share Tech Mono',monospace" }}>{fmtTime(sec)}</span>}
                                    </button>
                                    {!isDone && (
                                      <button style={S.markDoneBtnSmall} onClick={e => { e.stopPropagation(); markDone(ep.id, tKey); }}>
                                        済
                                      </button>
                                    )}
                                  </div>
                                );
                              })}
                              {isEdit && ph.id === "color_char" && (
                                <button style={{ padding: "6px 10px", borderRadius: 8, border: "1.5px dashed #ECE5DD", background: "transparent", color: "#BDB5AC", fontSize: 11, cursor: "pointer" }}
                                  onClick={e => { e.stopPropagation(); addPanel(ep.id); }}>+ コマ追加</button>
                              )}
                              {!isEdit && !allPh && prog.done < prog.total && (
                                <button style={S.bulkBtn}
                                  onClick={e => { e.stopPropagation(); bulkCompletePhase(ep.id, ph.id); }}>
                                  ✓ まとめて完了
                                </button>
                              )}
                            </div>
                          )}
                        </div>
                      );
                    })}

                    <div style={{ display: "flex", gap: 8, marginTop: 10, paddingTop: 10, borderTop: "1px solid #F0EAE3" }}>
                      <button style={S.ghost} onClick={e => { e.stopPropagation(); setEditingEp(isEdit ? null : ep.id); }}>{isEdit ? "✓ 編集完了" : "✏ コマ名編集"}</button>
                      <button style={{ ...S.ghost, color: "#D4626A", borderColor: "#F5D5D5" }} onClick={e => { e.stopPropagation(); if (confirm("「" + ep.title + "」を削除？")) deleteEp(ep.id); }}>🗑 削除</button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}

          {addingEp ? (
            <div style={{ background: "#FFF", borderRadius: 14, padding: "16px 14px", boxShadow: "0 1px 4px rgba(0,0,0,.04)", marginTop: 4 }}>
              <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 12 }}>📦 新エピソード追加</div>

              {/* ── Import from script ── */}
              <div style={{ marginBottom: 14, padding: "12px", borderRadius: 10, background: "#F8F5F2", border: "1.5px dashed #E8E0D8" }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#5D534A", marginBottom: 6 }}>📄 台本から読み込み</div>
                <div style={{ fontSize: 10, color: "#9E9590", marginBottom: 8 }}>タイトルとコマ数（【C1】【C2】…）を自動検出します</div>

                {!showPaste ? (
                  <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                    <div style={{ display: "flex", gap: 6 }}>
                      <label style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 6, padding: "10px 14px", borderRadius: 8, background: "#FFF", border: "1.5px solid #E8E0D8", cursor: "pointer", fontSize: 12, fontWeight: 600, color: "#5D534A" }}>
                        📂 ファイルを選択
                        <input type="file" accept=".md,.txt,.markdown,text/*" onChange={handleFileImport} style={{ display: "none" }} />
                      </label>
                      <button style={{ flex: 1, padding: "10px 14px", borderRadius: 8, background: "#FFF", border: "1.5px solid #E8E0D8", cursor: "pointer", fontSize: 12, fontWeight: 600, color: "#5D534A", fontFamily: "'M PLUS Rounded 1c',sans-serif" }}
                        onClick={() => setShowPaste(true)}>
                        📝 テキストを貼り付け
                      </button>
                    </div>
                    <div style={{ fontSize: 9, color: "#BDB5AC", textAlign: "center" }}>Google Driveのファイルもスマホのファイル選択から開けます</div>
                  </div>
                ) : (
                  <div>
                    <textarea
                      style={{
                        width: "100%", minHeight: 120, padding: "10px 12px", borderRadius: 10,
                        border: "1.5px solid #E8E0D8", fontSize: 12, color: "#3D3530",
                        background: "#FFF", resize: "vertical", lineHeight: 1.5,
                        fontFamily: "'M PLUS Rounded 1c',sans-serif",
                      }}
                      placeholder={"台本のテキストをここに貼り付けてね\n\n例:\n# 台本：「届くといいな」\n### ▼ PAGE 1（3コマ）\n**【C1】大ゴマ（上段）**\n**【C2】中ゴマ（下段右）**\n..."}
                      value={pasteText}
                      onChange={e => setPasteText(e.target.value)}
                    />
                    {/* Preview */}
                    {pasteText.length > 10 && (() => {
                      const preview = parseScript(pasteText);
                      return (
                        <div style={{ marginTop: 8, padding: "8px 10px", borderRadius: 8, background: "#FFF", border: "1px solid #ECE5DD" }}>
                          <div style={{ fontSize: 11, fontWeight: 700, color: "#5D534A", marginBottom: 4 }}>検出結果プレビュー</div>
                          <div style={{ fontSize: 12, fontWeight: 700, color: preview.title ? "#3D3530" : "#D4626A" }}>
                            {preview.title || "（タイトル未検出）"}
                          </div>
                          <div style={{ fontSize: 11, color: "#9E9590", marginTop: 2 }}>
                            {preview.panels.length > 0
                              ? `${preview.panels.length}コマ検出: ${preview.panels.map(p => p.label).join(", ")}`
                              : "コマが検出できませんでした"}
                          </div>
                        </div>
                      );
                    })()}
                    <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
                      <button style={S.btnPri}
                        onClick={() => { if (pasteText.trim()) { importScript(pasteText); setPasteText(""); setShowPaste(false); } }}>
                        読み込む
                      </button>
                      <button style={S.ghost} onClick={() => { setShowPaste(false); setPasteText(""); }}>戻る</button>
                    </div>
                  </div>
                )}
              </div>

              {/* ── Or manual add ── */}
              <div style={{ fontSize: 11, color: "#BDB5AC", fontWeight: 600, marginBottom: 8, textAlign: "center" }}>または手動で追加</div>
              <input style={S.input} placeholder="タイトル" value={newTitle} onChange={e => setNewTitle(e.target.value)} />
              <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 10 }}>
                <label style={{ display: "flex", flexDirection: "column", gap: 4, fontSize: 11, color: "#9E9590", fontWeight: 600 }}>
                  コマ数
                  <select style={S.sel} value={newPanelCount} onChange={e => setNewPanelCount(+e.target.value)}>
                    {[3, 4, 5, 6, 7, 8, 9, 10, 12].map(n => <option key={n} value={n}>{n}コマ</option>)}
                  </select>
                </label>
              </div>
              <div style={{ fontSize: 10, color: "#BDB5AC", marginBottom: 10 }}>※ 工程（下書き〜仕上げ）は自動生成。コマ名は後から編集可</div>
              <div style={{ display: "flex", gap: 8 }}>
                <button style={S.btnPri} onClick={addEpisode}>追加する</button>
                <button style={S.ghost} onClick={() => { setAddingEp(false); setShowPaste(false); setPasteText(""); }}>キャンセル</button>
              </div>
            </div>
          ) : (
            <button style={S.addBtn} onClick={() => setAddingEp(true)}>＋ エピソードを追加</button>
          )}

          <div style={{ textAlign: "center", padding: "16px 0 32px" }}>
            <button style={{ padding: "6px 16px", borderRadius: 20, border: "1px solid #E8E0D8", background: "transparent", color: "#BDB5AC", fontSize: 10, cursor: "pointer", fontFamily: "'M PLUS Rounded 1c',sans-serif" }} onClick={resetAll}>データリセット</button>
          </div>
        </div>
      )}

      {/* ═══ Stats Tab ═══ */}
      {!working && tab === "stats" && (() => {
        const completedEps = episodes.filter(e => e.allDone && totalSeconds(e) > 0);
        const avgPerTask = globalDone > 0 ? Math.round(globalSec / globalDone) : 0;

        // Per-phase averages
        const phaseStats = PHASES.map(ph => {
          let totalSec = 0, count = 0;
          episodes.forEach(ep => {
            if (ph.unit === "batch") {
              if (ep.seconds[ph.id]) { totalSec += ep.seconds[ph.id]; count++; }
            } else {
              ep.panels.forEach(p => {
                const k = ph.id + ":" + p.id;
                if (ep.seconds[k]) { totalSec += ep.seconds[k]; count++; }
              });
            }
          });
          return { ...ph, totalSec, count, avg: count > 0 ? Math.round(totalSec / count) : 0 };
        });

        // Per-episode summary (include any ep with at least 1 done task)
        const epSummaries = episodes.filter(e => countAllDone(e).done > 0 && e.id !== "ep1").map(ep => {
          const secs = totalSeconds(ep);
          const { done: dc, total: dt } = countAllDone(ep);
          const timedCount = Object.values(ep.seconds || {}).filter(v => v > 0).length;
          const phaseBreakdown = PHASES.map(ph => {
            let s = 0;
            if (ph.unit === "batch") { s = ep.seconds[ph.id] || 0; }
            else { ep.panels.forEach(p => { s += ep.seconds[ph.id + ":" + p.id] || 0; }); }
            return { label: ph.icon + " " + ph.label, seconds: s };
          }).filter(p => p.seconds > 0);
          return { ep, secs, dc, dt, timedCount, phaseBreakdown };
        });

        // Latest completed ep for "直近1話"
        const latestDone = [...completedEps].pop();
        const latestSummary = latestDone ? epSummaries.find(s => s.ep.id === latestDone.id) : null;

        return (
          <div style={{ padding: "4px 16px 32px" }}>
            {/* ── Overview ── */}
            <div style={{ background: "#FFF", borderRadius: 14, padding: "14px", marginBottom: 8, boxShadow: "0 1px 4px rgba(0,0,0,.03)" }}>
              <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 10 }}>📊 全体サマリー</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                {[
                  { v: fmtTime(avgPerTask), l: "平均/タスク" },
                  { v: (data.activeDays || []).length + "日", l: "累計稼働日" },
                  { v: String(data.totalCompleted || 0), l: "累計タスク" },
                ].map((s, i) => (
                  <div key={i} style={{ textAlign: "center", padding: "8px 4px", background: "#FAF6F1", borderRadius: 10 }}>
                    <div style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 18, fontWeight: 700, color: "#3D3530" }}>{s.v}</div>
                    <div style={{ fontSize: 10, color: "#9E9590" }}>{s.l}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* ── Phase Averages ── */}
            <div style={{ background: "#FFF", borderRadius: 14, padding: "14px", marginBottom: 8, boxShadow: "0 1px 4px rgba(0,0,0,.03)" }}>
              <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 10 }}>⏱ 工程別の平均時間</div>
              {phaseStats.map(ps => {
                const maxSec = Math.max(...phaseStats.map(p => p.avg), 1);
                return (
                  <div key={ps.id} style={{ marginBottom: 8 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 2 }}>
                      <span style={{ fontSize: 12, fontWeight: 600 }}>{ps.icon} {ps.label}</span>
                      <span style={{ fontSize: 11, fontFamily: "'Share Tech Mono',monospace", color: ps.avg > 0 ? "#5D534A" : "#BDB5AC" }}>
                        {ps.avg > 0 ? fmtTime(ps.avg) : "—"}<span style={{ fontSize: 9, color: "#BDB5AC", marginLeft: 4 }}>({ps.count}回)</span>
                      </span>
                    </div>
                    <div style={{ height: 6, background: "#F0EAE3", borderRadius: 3, overflow: "hidden" }}>
                      <div style={{ height: "100%", borderRadius: 3, transition: "width .4s", width: `${ps.avg > 0 ? (ps.avg / maxSec * 100) : 0}%`, background: ps.id.includes("color") ? "#A7D1E8" : ps.id === "finish" ? "#B8E6C8" : "#F2A7B0" }} />
                    </div>
                  </div>
                );
              })}
              {phaseStats.every(p => p.avg === 0) && <div style={{ fontSize: 11, color: "#BDB5AC", textAlign: "center", padding: 8 }}>タイマーで作業するとここにデータが貯まります</div>}
            </div>

            {/* ── Latest Episode ── */}
            {latestSummary && (
              <div style={{ background: "#FFF", borderRadius: 14, padding: "14px", marginBottom: 8, boxShadow: "0 1px 4px rgba(0,0,0,.03)" }}>
                <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 10 }}>📖 直近1話：{latestSummary.ep.title}</div>
                <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 8 }}>
                  <span style={{ fontSize: 20, fontWeight: 800, fontFamily: "'Share Tech Mono',monospace", color: latestSummary.secs > 0 ? "#F2A7B0" : "#BDB5AC" }}>
                    {latestSummary.secs > 0 ? fmtTime(latestSummary.secs) : "計測なし"}
                  </span>
                  {latestSummary.secs > 0 && <span style={{ fontSize: 10, color: "#C8C0B8" }}>({latestSummary.timedCount}/{latestSummary.dc}タスク計測)</span>}
                </div>
                {latestSummary.phaseBreakdown.length > 0 && (
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                    {latestSummary.phaseBreakdown.map((pb, i) => (
                      <div key={i} style={{ fontSize: 10, padding: "4px 8px", borderRadius: 6, background: "#FAF6F1", color: "#7D7168" }}>
                        {pb.label} <span style={{ fontFamily: "'Share Tech Mono',monospace", fontWeight: 700 }}>{fmtTime(pb.seconds)}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* ── Per-Episode Times ── */}
            {epSummaries.length > 0 && (
              <div style={{ background: "#FFF", borderRadius: 14, padding: "14px", marginBottom: 8, boxShadow: "0 1px 4px rgba(0,0,0,.03)" }}>
                <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 10 }}>📈 話ごとの作業時間</div>
                {epSummaries.map((es, i) => {
                  const maxEpSec = Math.max(...epSummaries.map(e => e.secs).filter(s => s > 0), 1);
                  return (
                    <div key={es.ep.id} style={{ marginBottom: 8 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 2 }}>
                        <span style={{ fontSize: 11, fontWeight: 600, maxWidth: "55%", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{es.ep.title}</span>
                        <span style={{ fontSize: 11, fontFamily: "'Share Tech Mono',monospace", color: es.ep.allDone ? "#4CAF50" : "#5D534A" }}>
                          {es.secs > 0 ? fmtTime(es.secs) : "計測なし"}
                          {es.ep.allDone && " ✓"}
                          {es.secs > 0 && <span style={{ fontSize: 9, color: "#C8C0B8", marginLeft: 3 }}>({es.timedCount}/{es.dc})</span>}
                        </span>
                      </div>
                      {es.secs > 0 ? (
                        <div style={{ height: 8, background: "#F0EAE3", borderRadius: 4, overflow: "hidden", display: "flex" }}>
                          {es.phaseBreakdown.map((pb, j) => {
                            const w = es.secs > 0 ? (pb.seconds / es.secs * 100) : 0;
                            const colors = { "✏️ 下書き": "#F2A7B0", "🖊️ ペン入れ": "#D4B5E8", "🎨 キャラ塗り": "#A7D1E8", "🏠 背景塗り": "#87C4B4", "✨ 仕上げ": "#B8E6C8" };
                            return <div key={j} style={{ height: "100%", width: `${w}%`, background: colors[pb.label] || "#E8E0D8", transition: "width .4s" }} />;
                          })}
                        </div>
                      ) : (
                        <div style={{ height: 8, background: "#F0EAE3", borderRadius: 4 }}>
                          <div style={{ height: "100%", width: `${es.dc / es.dt * 100}%`, background: "#E8E0D8", borderRadius: 4 }} />
                        </div>
                      )}
                      <div style={{ fontSize: 9, color: "#C8C0B8", marginTop: 2 }}>{es.dc}/{es.dt}タスク完了</div>
                    </div>
                  );
                })}
                {/* Legend */}
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 8 }}>
                  {[{ l: "下書き", c: "#F2A7B0" }, { l: "ペン入れ", c: "#D4B5E8" }, { l: "キャラ塗り", c: "#A7D1E8" }, { l: "背景塗り", c: "#87C4B4" }, { l: "仕上げ", c: "#B8E6C8" }].map(x => (
                    <div key={x.l} style={{ display: "flex", alignItems: "center", gap: 3 }}>
                      <div style={{ width: 8, height: 8, borderRadius: 2, background: x.c }} />
                      <span style={{ fontSize: 9, color: "#9E9590" }}>{x.l}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* ── Achievements ── */}
            <div style={{ background: "#FFF", borderRadius: 14, padding: "14px", marginBottom: 8, boxShadow: "0 1px 4px rgba(0,0,0,.03)" }}>
              <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 10 }}>🏆 アチーブメント <span style={{ fontSize: 11, color: "#F2A7B0", fontWeight: 800 }}>{(data.unlockedAchievements || []).length}/{ACHIEVEMENTS.length}</span></div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
                {ACHIEVEMENTS.map(ach => {
                  const unlocked = (data.unlockedAchievements || []).includes(ach.id);
                  return (
                    <div key={ach.id} style={{
                      padding: "8px 10px", borderRadius: 10,
                      background: unlocked ? "#FFF9F0" : "#F8F5F2",
                      border: unlocked ? "1.5px solid #F5D5A0" : "1.5px solid #ECE5DD",
                      opacity: unlocked ? 1 : 0.5,
                    }}>
                      <div style={{ fontSize: 18, marginBottom: 2 }}>{ach.icon}</div>
                      <div style={{ fontSize: 11, fontWeight: 700, color: unlocked ? "#3D3530" : "#BDB5AC" }}>{ach.label}</div>
                      <div style={{ fontSize: 9, color: "#9E9590" }}>{ach.desc}</div>
                    </div>
                  );
                })}
              </div>
            </div>

            <div style={{ textAlign: "center", padding: "16px 0 32px" }}>
              <button style={{ padding: "6px 16px", borderRadius: 20, border: "1px solid #E8E0D8", background: "transparent", color: "#BDB5AC", fontSize: 10, cursor: "pointer", fontFamily: "'M PLUS Rounded 1c',sans-serif" }} onClick={resetAll}>データリセット</button>
            </div>
          </div>
        );
      })()}

      {celebration && (
        <div style={{
          position: "fixed", top: 60, left: "50%", transform: "translateX(-50%)",
          zIndex: 150, pointerEvents: "none",
          background: celebration === "episode" ? "linear-gradient(135deg,#FFF5F5,#FFF)" : "#FFF",
          borderRadius: 14, padding: "10px 20px",
          boxShadow: "0 4px 20px rgba(0,0,0,.1)",
          border: celebration === "episode" ? "2px solid #F2A7B0" : "1.5px solid #B8E6C8",
          display: "flex", alignItems: "center", gap: 10,
          animation: "toastIn .3s ease both",
          maxWidth: "90%",
        }}>
          <span style={{ fontSize: celebration === "episode" ? 28 : 22 }}>{celebration === "episode" ? "🎉" : "🏁"}</span>
          <span style={{ fontSize: 13, fontWeight: 700, color: "#3D3530" }}>{celebration === "episode" ? "1話ぶん 処理完了！！" : "工程クリア！次へ！"}</span>
        </div>
      )}
      {newAchievement && (
        <div style={{
          position: "fixed", top: celebration ? 110 : 60, left: "50%", transform: "translateX(-50%)",
          zIndex: 160, pointerEvents: "none",
          background: "linear-gradient(135deg,#FFF9F0,#FFF)",
          borderRadius: 14, padding: "10px 20px",
          boxShadow: "0 4px 20px rgba(245,213,160,.3)",
          border: "2px solid #F5D5A0",
          display: "flex", alignItems: "center", gap: 10,
          animation: "toastIn .3s ease both",
          maxWidth: "90%",
        }}>
          <span style={{ fontSize: 24 }}>{newAchievement.icon}</span>
          <div>
            <div style={{ fontSize: 10, color: "#C4A46C", fontWeight: 700 }}>🏆 解放！</div>
            <div style={{ fontSize: 13, fontWeight: 700, color: "#3D3530" }}>{newAchievement.label}</div>
          </div>
        </div>
      )}
    </div>
  );
}

function Confetti({ active, big }) {
  if (!active) return null;
  const ps = Array.from({ length: big ? 24 : 10 }, (_, i) => ({ i, x: Math.random() * 100, d: Math.random() * .3, dur: .6 + Math.random() * .8, c: ["#F2A7B0", "#A7D1E8", "#B8E6C8", "#F5D5A0", "#D4B5E8", "#FFB7C5"][i % 6], s: 3 + Math.random() * (big ? 7 : 5) }));
  return <div style={{ position: "fixed", inset: 0, pointerEvents: "none", zIndex: 200 }}>
    {ps.map(p => <div key={p.i} style={{ position: "absolute", left: p.x + "%", top: -10, width: p.s, height: p.s, borderRadius: Math.random() > .5 ? "50%" : "2px", background: p.c, animation: `confettiFall ${p.dur}s ease-in ${p.d}s forwards` }} />)}
  </div>;
}
