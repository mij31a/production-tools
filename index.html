<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#111116">
<title>ぷわんな毎日 制作ツール</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: #111116; }

.tab-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 48px;
  background: #111116;
  border-bottom: 1px solid #2A2A38;
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 6px;
  z-index: 9999;
  font-family: "Zen Kaku Gothic New", sans-serif;
}

.tab-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 8px;
  border: 1px solid transparent;
  background: transparent;
  color: #7E7E96;
  font-size: 13px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.tab-btn.active-factory {
  background: #F2A7B018;
  color: #F2A7B0;
  border-color: #F2A7B044;
}
.tab-btn.active-dashboard {
  background: #FF6B9D18;
  color: #FF6B9D;
  border-color: #FF6B9D44;
}
.tab-btn:not(.active-factory):not(.active-dashboard):hover {
  background: #1E1E28;
  color: #E4E4EE;
}

.frames {
  position: fixed;
  top: 48px; left: 0; right: 0; bottom: 0;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: none;
}
iframe.visible {
  display: block;
}
</style>
</head>
<body>

<div class="tab-bar">
  <button class="tab-btn active-factory" id="btn-factory" onclick="switchTab('factory')">
    🏭 <span>制作ファクトリー</span>
  </button>
  <button class="tab-btn" id="btn-dashboard" onclick="switchTab('dashboard')">
    📊 <span>ダッシュボード</span>
  </button>
</div>

<div class="frames">
  <iframe id="frame-factory" src="factory.html" class="visible"></iframe>
  <iframe id="frame-dashboard" src="dashboard.html"></iframe>
</div>

<script>
  var current = 'factory';

  function switchTab(tab) {
    if (tab === current) return;
    current = tab;

    document.getElementById('frame-factory').className = tab === 'factory' ? 'visible' : '';
    document.getElementById('frame-dashboard').className = tab === 'dashboard' ? 'visible' : '';

    var btnF = document.getElementById('btn-factory');
    var btnD = document.getElementById('btn-dashboard');
    btnF.className = 'tab-btn' + (tab === 'factory' ? ' active-factory' : '');
    btnD.className = 'tab-btn' + (tab === 'dashboard' ? ' active-dashboard' : '');

  }
</script>

</body>
</html>
