  const res = await fetch(url, { redirect: "follow" });

}
async function gasPost(url, data) {

function getPhaseProgress(ep, phaseId) {
  const ph = PHASES.find(p => p.id === phaseId);
  if (!ph) return { done: 0, total: 0 };
  if (ph.unit === "batch") return { done: ep.done[phaseId] ? 1 : 0, total: 1 };
  const total = ep.panels.length;
  const done = ep.panels.filter(p => ep.done[phaseId + ":" + p.id]).length;
  return { done, total };
}

function isEpAllDone(ep) {
  return PHASES.every(ph => {
    const { done, total } = getPhaseProgress(ep, ph.id);
    return done >= total;
  });
}

function getNextTask(ep) {
  for (const ph of PHASES) {
    if (ph.unit === "batch") {
      if (!ep.done[ph.id]) return { key: ph.id, phase: ph, panelId: null, panelLabel: null };
    } else {
      for (const panel of ep.panels) {
        const key = ph.id + ":" + panel.id;
        if (!ep.done[key]) return { key, phase: ph, panelId: panel.id, panelLabel: panel.label };
      }
    }
  }
  return null;
}

function countAllDone(ep) {
  let done = 0, total = 0;
  PHASES.forEach(ph => {
    if (ph.unit === "batch") { total++; if (ep.done[ph.id]) done++; }
    else { ep.panels.forEach(p => { total++; if (ep.done[ph.id + ":" + p.id]) done++; }); }
  });
  return { done, total };
}

function calcStreak(activeDays) {
  if (!activeDays || activeDays.length === 0) return 0;
  const sorted = [...activeDays].sort().reverse();
  const today = new Date().toISOString().slice(0, 10);
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  if (sorted[0] !== today && sorted[0] !== yesterday) return 0;
  let streak = 1;
  for (let i = 0; i < sorted.length - 1; i++) {
    const diff = (new Date(sorted[i]) - new Date(sorted[i + 1])) / 86400000;
    if (diff === 1) streak++;
    else break;
  }
  return streak;
}

function calcMaxStreak(activeDays) {
  if (!activeDays || activeDays.length === 0) return 0;
  const sorted = [...new Set(activeDays)].sort();
  let max = 1, cur = 1;
  for (let i = 1; i < sorted.length; i++) {
    const diff = (new Date(sorted[i]) - new Date(sorted[i - 1])) / 86400000;
    if (diff === 1) { cur++; max = Math.max(max, cur); }
    else { cur = 1; }
  }
  return max;
}

function fmtTime(s) {
  if (!s || s <= 0) return "—";
  if (s < 60) return s + "秒";
  const m = Math.floor(s / 60), sec = s % 60;
  if (m < 60) return m + "分" + (sec > 0 ? sec + "秒" : "");
  return Math.floor(m / 60) + "時間" + (m % 60) + "分";
}
function fmtTimer(s) {
  const m = Math.floor(s / 60), sec = s % 60;
  return String(m).padStart(2, "0") + ":" + String(sec).padStart(2, "0");
}

function CalendarPicker({ value, onChange, label }) {
  const [open, setOpen] = useState(false);
  const [vd, setVd] = useState(() => value ? new Date(value) : new Date());
  const ref = useRef(null);
  useEffect(() => { function h(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); } document.addEventListener("mousedown", h); return () => document.removeEventListener("mousedown", h); }, []);
  const y = vd.getFullYear(), mo = vd.getMonth();
  const fd = new Date(y, mo, 1).getDay(), dim = new Date(y, mo + 1, 0).getDate();
  const today = toISO(new Date());
  const days = []; for (let i = 0; i < fd; i++) days.push(null); for (let i = 1; i <= dim; i++) days.push(i);
  const mN = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
  const wD = ["日","月","火","水","木","金","土"];
  function sel(day) { onChange(y + "-" + String(mo+1).padStart(2,"0") + "-" + String(day).padStart(2,"0")); setOpen(false); }
  return <div ref={ref} style={{ position: "relative", display: "inline-block" }}>
    <button onClick={e => { e.stopPropagation(); setOpen(!open); }} style={{ padding: "8px 10px", borderRadius: 8, border: "1.5px solid #2A2A38", background: "#111116", color: "#E4E4EE", cursor: "pointer", display: "flex", alignItems: "center", gap: 8, minWidth: 130, justifyContent: "space-between", fontSize: 13, fontFamily: "'M PLUS Rounded 1c',sans-serif" }}>

    </button>
    {open && <div onClick={e => e.stopPropagation()} style={{ position: "absolute", top: "100%", left: 0, zIndex: 100, marginTop: 4, background: "#1E1E28", border: "1px solid #2A2A38", borderRadius: 12, padding: 12, width: 260, boxShadow: "0 12px 40px rgba(0,0,0,.5)" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <button onClick={() => setVd(new Date(y, mo-1, 1))} style={{ background: "none", border: "none", color: "#7E7E96", cursor: "pointer", fontSize: 16, fontFamily: "inherit" }}>◀</button>
        <span style={{ fontSize: 14, fontWeight: 700, color: "#E4E4EE" }}>{y+"年 "+mN[mo]}</span>

              const dashEp = oldDash.episodes.find(de => de.title === fep.title);
              if (dashEp) {
                return { ...fep, postType: dashEp.postType, steps: dashEp.steps, postDate: dashEp.postDate, snsState: dashEp.snsState, captions: dashEp.captions, snsMetrics: dashEp.snsMetrics, storyDraft: dashEp.storyDraft || dashEp.story, postUrls: dashEp.postUrls, analyticsNote: dashEp.analyticsNote };
              }
              return fep;
            });
            // Add dashboard-only episodes not in factory
            oldDash.episodes.forEach(de => {
              if (!saved.episodes.find(e => e.title === de.title)) {
                saved.episodes.push({ id: "ep" + Date.now() + Math.random().toString(36).slice(2, 6), title: de.title, panels: [], done: {}, seconds: {}, allDone: false, postType: de.postType, steps: de.steps, postDate: de.postDate, snsState: de.snsState, captions: de.captions, snsMetrics: de.snsMetrics, storyDraft: de.storyDraft || de.story, postUrls: de.postUrls, analyticsNote: de.analyticsNote });
              }
            });
            // Carry over dashboard global fields
            saved.nextId = oldDash.nextId || saved.episodes.length + 1;
            saved.projectName = oldDash.projectName;
            saved.defaultCadence = oldDash.defaultCadence;
            saved.weeklyFollowers = oldDash.weeklyFollowers;
            saved.weeklyReviews = oldDash.weeklyReviews;
            saved.dismissedTasks = oldDash.dismissedTasks;
          }
          // Save to new unified key
          storage.set(SK, saved);
        }
      }

      if (saved && saved.episodes) {
        // Migration: add prologue if missing
        if (!saved.episodes.find(e => e.id === "ep0")) {
          const prologueEp = { ...DEFAULT_EPS[0] };
          saved.episodes.unshift(prologueEp);
        }
        // Migration: remove "ラベルカード" from panels (now a batch phase)
        let migrated = false;
        saved.episodes.forEach(ep => {
          if (ep.panels && ep.panels.some(p => p.label === "ラベルカード")) {
            const labelPanelIds = ep.panels.filter(p => p.label === "ラベルカード").map(p => p.id);
            ep.panels = ep.panels.filter(p => p.label !== "ラベルカード");
            // Move done state: if any label panel task was done, mark label phase done
            const wasDone = labelPanelIds.some(pid => ["ink","color","finish"].some(ph => ep.done[ph + ":" + pid]));
            if (wasDone) ep.done.label = true;
            // Clean up old keys
            labelPanelIds.forEach(pid => { ["ink","color","finish"].forEach(ph => { delete ep.done[ph + ":" + pid]; delete ep.seconds[ph + ":" + pid]; }); });
            ep.allDone = isEpAllDone(ep);
            migrated = true;
          }
        });
        if (migrated) storage.set(SK, saved);
        setData(saved);
        setTodayStats(saved.todayStats?.date === today ? saved.todayStats : { panels: 0, seconds: 0, date: today });
        const lastActive = saved.lastActiveDate;
        if (lastActive) {
          const daysSince = Math.round((new Date(today) - new Date(lastActive)) / 86400000);
          if (daysSince >= 3) setPuwanMsg(rMsg("welcomeBack"));
          else if (daysSince >= 1) setPuwanMsg(rMsg("welcomeNextDay"));
          else setPuwanMsg(rMsg("idle"));
        } else { setPuwanMsg(rMsg("idle")); }
      } else {
        setData({ episodes: DEFAULT_EPS });
        setTodayStats({ panels: 0, seconds: 0, date: today });
        setPuwanMsg(rMsg("idle"));
      }
    } catch {
      setData({ episodes: DEFAULT_EPS });
      setTodayStats({ panels: 0, seconds: 0, date: new Date().toISOString().slice(0, 10) });
      setPuwanMsg(rMsg("idle"));
    }
    setLoading(false);
  }, []);

  // Cross-iframe sync: reload when the other tool saves
  useEffect(() => {
    function onStorage(e) {
      if (e.key === SK && e.newValue) {
        try {
          const d = JSON.parse(e.newValue);
          if (d && d.episodes) { setData(d); }
        } catch {}
      }
    }
    window.addEventListener("storage", onStorage);
    return () => window.removeEventListener("storage", onStorage);
  }, []);

  // Save
  const save = useCallback(async (d, stats) => {
    const s = stats || todayStats;
    setData(d); if (stats) setTodayStats(stats);
    try { storage.set(SK, { ...d, todayStats: s }); gasSyncSave({ ...d, todayStats: s }); } catch {}
  }, [todayStats]);

  function saveGasUrl(url) { setGasUrl(url); storage.set(GAS_URL_KEY, url); }
  async function pullFromGas() {
    if (!gasUrl) { setGasStatus("URLが未設定"); return; }
    setSyncing(true); setGasStatus("");
    try {
      const remote = await gasGet(gasUrl);
      if (remote && remote.episodes) { save(remote, remote.todayStats); setGasStatus("取得完了！"); }
      else { setGasStatus("リモートにデータなし"); }
    } catch(e) { setGasStatus("取得失敗"); }
    setSyncing(false);
  }
  async function pushToGas() {
    if (!gasUrl) { setGasStatus("URLが未設定"); return; }
    setSyncing(true); setGasStatus("");
    try { await gasPost(gasUrl, { ...data, todayStats }); setGasStatus("送信完了！"); }
    catch(e) { setGasStatus("送信失敗"); }
    setSyncing(false);
  }

  // Record activity (called on any task completion)
  function recordActivity(d, isTimerTask) {
    const today = new Date().toISOString().slice(0, 10);
    const hour = new Date().getHours();
    const activeDays = [...new Set([...(d.activeDays || []), today])];
    const lastActive = d.lastActiveDate || "";
    const daysSinceLast = lastActive ? Math.round((new Date(today) - new Date(lastActive)) / 86400000) : 0;
    const hasComeback = d.hasComeback || daysSinceLast >= 3;
    const totalCompleted = (d.totalCompleted || 0) + 1;
    const maxStreak = calcMaxStreak(activeDays);
    const nightOwl = d.nightOwl || hour >= 23;
    const earlyBird = d.earlyBird || hour < 7;
    const todayTasks = (d.todayStats?.date === today ? (d.todayStats?.panels || 0) : 0) + 1;
    const maxDailyTasks = Math.max(d.maxDailyTasks || 0, todayTasks);

    return { ...d, activeDays, lastActiveDate: today, totalCompleted, maxStreak, hasComeback, nightOwl, earlyBird, maxDailyTasks };
  }

  function checkNewAchievements(d) {
    const unlocked = d.unlockedAchievements || [];
    for (const ach of ACHIEVEMENTS) {
      if (!unlocked.includes(ach.id) && ach.check(d)) {
        const newUnlocked = [...unlocked, ach.id];
        setNewAchievement(ach);
        setTimeout(() => setNewAchievement(null), 2000);
        return { ...d, unlockedAchievements: newUnlocked };
      }
    }
    return d;
  }

  // Stopwatch timer (timestamp-based to survive background tab throttling)
  useEffect(() => {
    if (stopwatch?.running) {
      timerRef.current = setInterval(() => {
        setElapsed(Math.floor((Date.now() - stopwatch.startedAt) / 1000) + (stopwatch.banked || 0));
      }, 500);
    } else { clearInterval(timerRef.current); }
    return () => clearInterval(timerRef.current);
  }, [stopwatch?.running, stopwatch?.startedAt, stopwatch?.banked]);

  function startStopwatch(epId) {
    setStopwatch({ running: true, epId: epId || null, startedAt: Date.now(), banked: 0 });
    setElapsed(0); setPuwanMsg(rMsg("start"));
    if (epId) setActiveEp(epId);
  }
  function pauseStopwatch() {
    setStopwatch(sw => {
      if (!sw) return null;
      const now = Math.floor((Date.now() - sw.startedAt) / 1000) + (sw.banked || 0);
      setElapsed(now);
      return { ...sw, running: false, banked: now };
    });
    setPuwanMsg(rMsg("paused"));
  }
  function resumeStopwatch() {
    setStopwatch(sw => sw ? { ...sw, running: true, startedAt: Date.now() } : null);
    setPuwanMsg(rMsg("start"));
  }
  function stopStopwatch() {
    if (!stopwatch) return;
    const today = new Date().toISOString().slice(0, 10);
    const newStats = { panels: todayStats.date === today ? todayStats.panels : 0, seconds: (todayStats.date === today ? todayStats.seconds : 0) + elapsed, date: today };
    // Save elapsed to episode if linked
    let newData = { ...data };
    if (stopwatch.epId && elapsed > 0) {
      newData = { ...newData, episodes: newData.episodes.map(ep => {
        if (ep.id !== stopwatch.epId) return ep;
        return { ...ep, seconds: { ...ep.seconds, _total: (ep.seconds._total || 0) + elapsed } };
      })};
    }
    setStopwatch(null); setElapsed(0); setPuwanMsg(rMsg("done1"));
    let updated = recordActivity(newData, false);
    updated = checkNewAchievements(updated);
    save(updated, newStats);
  }

  // Mark done (toggle on)
  function markDone(epId, taskKey) {
    const now = Date.now();
    const sinceLastDone = lastDoneAt ? (now - lastDoneAt) / 1000 : 999;
    const newEps = data.episodes.map(ep => {
      if (ep.id !== epId) return ep;
      const updated = { ...ep, done: { ...ep.done, [taskKey]: true } };
      updated.allDone = isEpAllDone(updated);
      return updated;
    });
    const ep = newEps.find(e => e.id === epId);
    const phaseId = taskKey.split(":")[0];
    const { done: phD, total: phT } = getPhaseProgress(ep, phaseId);
    const phaseComplete = phD >= phT;
    const epComplete = ep.allDone;
    let newCombo = sinceLastDone < 300 ? combo + 1 : 1;
    setCombo(newCombo); setLastDoneAt(now);
    clearTimeout(comboRef.current);
    comboRef.current = setTimeout(() => setCombo(0), 300000);
    if (epComplete) { setPuwanMsg(rMsg("epDone")); setCelebration("episode"); setShowConfetti(true); setTimeout(() => { setShowConfetti(false); setCelebration(null); }, 1800); }
    else if (phaseComplete) { setPuwanMsg(rMsg("phaseDone")); setCelebration("phase"); setTimeout(() => setCelebration(null), 1500); }
    else if (newCombo >= 3) { setPuwanMsg(rMsg("combo")); setShowConfetti(true); setTimeout(() => setShowConfetti(false), 800); }
    else { setPuwanMsg(rMsg("done1")); }
    const today = new Date().toISOString().slice(0, 10);
    const newStats = { panels: (todayStats.date === today ? todayStats.panels : 0) + 1, seconds: todayStats.date === today ? todayStats.seconds : 0, date: today };
    let updated = recordActivity({ ...data, episodes: newEps }, true);
    updated = checkNewAchievements(updated);
    save(updated, newStats);
  }

  function bulkCompletePhase(epId, phaseId) {
    const newEps = data.episodes.map(ep => {
      if (ep.id !== epId) return ep;
      const nd = { ...ep.done };
      ep.panels.forEach(p => { nd[phaseId + ":" + p.id] = true; });
      const u = { ...ep, done: nd }; u.allDone = isEpAllDone(u); return u;
    });
    const ep = newEps.find(e => e.id === epId);
    if (ep.allDone) {
      setPuwanMsg(rMsg("epDone")); setCelebration("episode"); setShowConfetti(true);
      setTimeout(() => { setShowConfetti(false); setCelebration(null); }, 1800);
    } else {
      setPuwanMsg(rMsg("phaseDone")); setCelebration("phase");
      setTimeout(() => setCelebration(null), 1500);
    }
    let updated = recordActivity({ ...data, episodes: newEps }, false);
    updated = checkNewAchievements(updated);
    save(updated);
  }

  function toggleTask(epId, taskKey) {
    const newEps = data.episodes.map(ep => {
      if (ep.id !== epId) return ep;
      const nd = { ...ep.done }; nd[taskKey] = !nd[taskKey];
      const u = { ...ep, done: nd }; u.allDone = isEpAllDone(u); return u;
    });

  }

  // ─── Script parser ───
  function parseScript(text) {
    const titleMatch = text.match(/^#\s*台本[：:]\s*[「『](.+?)[」』]/m);
    const snsMatch = text.match(/SNS表示タイトル[：:]\s*`(.+?)`/);
    const title = snsMatch?.[1] || titleMatch?.[1] || "";

    const panels = [];
    let currentPage = "";
    const lines = text.split("\n");

    for (const line of lines) {
      // Page header: ### ▼ PAGE 1（3コマ：...）
      const pageMatch = line.match(/###\s*▼\s*PAGE\s*(\d+)/i);
      if (pageMatch) {
        currentPage = "P" + pageMatch[1];
        continue;
      }
      // Panel: **【C1】大ゴマ（上段）** or **【C2】中ゴマ（下段右・先に読む）**
      const panelMatch = line.match(/\*\*【([A-Za-z]*\d+)】(.+?)\*\*/);
      if (panelMatch) {
        const cId = panelMatch[1];
        let desc = panelMatch[2].replace(/[（(].+?[）)]/g, "").trim();
        const label = currentPage ? `${currentPage}-${cId} ${desc}` : `${cId} ${desc}`;
        panels.push({ id: cId.toLowerCase() + "_" + panels.length, label: label.slice(0, 30) });
        continue;
      }
      // Omake section — now handled as separate "label" phase (batch)
    }

    return { title, panels };
  }

  function importScript(text) {
    const { title, panels } = parseScript(text);
    if (!title && panels.length === 0) return;
    const id = "ep" + Date.now();
    const ep = {
      id,
      title: title || "無題",
      panels: panels.length > 0 ? panels : [{ id: "c1", label: "C1" }],
      done: {}, seconds: {}, allDone: false,
      steps: {}, snsState: {}, captions: {}, snsMetrics: {}, postDate: "", postType: "manga", postUrls: {},
    };
    save({ ...data, episodes: [...data.episodes, ep] });
    setActiveEp(id);
    setAddingEp(false);
    setPuwanMsg("台本読み込んだよ！" + panels.length + "コマ検出…！");
  }

  function handleFileImport(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const text = ev.target.result;
      importScript(text);
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  function addEpisode() {
    if (!newTitle.trim()) return;
    const id = "ep" + Date.now();
    const panels = newPostType === "manga" ? Array.from({ length: newPanelCount }, (_, i) => ({ id: "c" + (i + 1), label: "C" + (i + 1) })) : [];
    save({ ...data, episodes: [...data.episodes, { id, title: newTitle.trim(), panels, done: {}, seconds: {}, allDone: false, steps: {}, snsState: {}, captions: {}, snsMetrics: {}, postDate: "", postType: newPostType, postUrls: {} }] });
    setNewTitle(""); setNewPanelCount(7); setNewPostType("manga"); setAddingEp(false);
  }

  function updateEp(epId, updates) { save({ ...data, episodes: data.episodes.map(e => e.id === epId ? { ...e, ...updates } : e) }); }
  function moveEp(epId, dir) {
    const eps = [...data.episodes];
    const idx = eps.findIndex(e => e.id === epId);
    if (idx < 0) return;
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= eps.length) return;
    [eps[idx], eps[newIdx]] = [eps[newIdx], eps[idx]];
    save({ ...data, episodes: eps });
  }
  function moveEpTo(epId, targetPos) {
    const eps = [...data.episodes];
    const idx = eps.findIndex(e => e.id === epId);
    if (idx < 0) return;
    const clamped = Math.max(0, Math.min(eps.length - 1, targetPos - 1));
    if (clamped === idx) return;
    const [ep] = eps.splice(idx, 1);
    eps.splice(clamped, 0, ep);
    save({ ...data, episodes: eps });
  }
  function deleteEp(epId) { save({ ...data, episodes: data.episodes.filter(e => e.id !== epId) }); if (activeEp === epId) setActiveEp(null); }

  function renamePanelLabel(epId, panelId, label) {

  }
  function addPanel(epId) {
    save({ ...data, episodes: data.episodes.map(ep => ep.id !== epId ? ep : { ...ep, panels: [...ep.panels, { id: "c" + Date.now(), label: "C" + (ep.panels.length + 1) }] }) });

  // ─── Pace calculation ───
  function calcPace(episodes, goal) {
    if (!goal || !goal.targetDate || !goal.startEp || !goal.endEp) return null;
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const target = new Date(goal.targetDate);

    const startDate = goal.startDate ? new Date(goal.startDate) : today;
    const spanDays = Math.max(1, Math.round((target - startDate) / 86400000));
    const totalDays = Math.max(0, Math.round((target - today) / 86400000));

    const rangeEps = episodes.slice(goal.startEp - 1, goal.endEp);
    const totalCount = rangeEps.length;
    const doneCount = rangeEps.filter(e => e.allDone).length;
    const remaining = Math.max(0, totalCount - doneCount);

    if (remaining <= 0) return { status: "done", msg: "目標達成済み…！すごい！", color: "#5DE8A0", milestones: [], doneCount, totalCount };

    // Milestones: evenly spaced across the full span
    const daysPerEp = spanDays / totalCount;
    const milestones = [];
    for (let i = 0; i < totalCount; i++) {
      const msDate = new Date(startDate.getTime() + daysPerEp * (i + 1) * 86400000);
      const ep = rangeEps[i];
      milestones.push({
        epId: ep?.id || null,
        epTitle: ep?.title || "第" + (goal.startEp + i) + "話",
        num: goal.startEp + i,
        date: msDate,
        dateStr: (msDate.getMonth() + 1) + "/" + msDate.getDate(),
        pct: Math.min(100, ((i + 1) / totalCount) * 100),
        isDone: ep?.allDone || false,
      });
    }

    // Today's position on the bar
    const todayPct = Math.min(100, Math.max(0, ((today - startDate) / (target - startDate)) * 100));

    // Pace evaluation
    const daysPerEpRemaining = totalDays > 0 ? totalDays / remaining : 0;
    let status, msg, color;
    if (totalDays <= 0) {
      status = "overdue"; msg = "期日を過ぎちゃった…でも、焦らなくてだいじょうぶ"; color = "#E88D67";
    } else if (daysPerEpRemaining < 2) {
      status = "tight"; msg = "ちょっと急ぎ足かも…でもできるよ"; color = "#E8B467";
    } else if (daysPerEpRemaining < 4) {
      status = "steady"; msg = "いいペースだよ…！このまま続けよう"; color = "#5EB5A0";
    } else {
      status = "relaxed"; msg = "余裕あるね！ていねいにいこう"; color = "#5DE8A0";
    }

    return { status, msg, color, milestones, doneCount, totalCount, remaining, totalDays, todayPct, daysPerEp: Math.round(daysPerEpRemaining * 10) / 10 };
  }

  return (

        *{box-sizing:border-box;margin:0;padding:0}

      <Confetti active={showConfetti} big={celebration === "episode"} />

                      <label style={{ display: "flex", flexDirection: "column", gap: 3, fontSize: 11, color: "#7E7E96", fontWeight: 600 }}>

                        <input type="number" min={goalStartEpInput} style={{ ...S.input, width: 70, marginBottom: 0, padding: "8px 10px", fontSize: 14, fontWeight: 700 }}
                          value={goalEndEpInput} onChange={e => setGoalEndEpInput(Math.max(goalStartEpInput, +e.target.value || goalStartEpInput))} />
                      </label>
                    </div>
                    {goalEndEpInput >= goalStartEpInput && (
                      <div style={{ marginBottom: 10, padding: "8px 10px", background: "#18181F", borderRadius: 8 }}>
                        <div style={{ fontSize: 10, color: "#4A4A60", marginBottom: 6 }}>完了状況（第{goalStartEpInput}〜第{goalEndEpInput}話）</div>
                        <div style={{ display: "flex", flexWrap: "wrap", gap: 3, marginBottom: 5 }}>

                            const isDone = ep?.allDone || false;
                            const exists = !!ep;
                            return (
                              <div key={i} style={{
                                minWidth: 24, height: 24, borderRadius: 5, padding: "0 4px",

                                border: "1px solid " + (isDone ? "#5DE8A044" : exists ? "#2A2A38" : "#1E1E28"),
                                display: "flex", alignItems: "center", justifyContent: "center",

                                color: isDone ? "#5DE8A0" : exists ? "#4A4A60" : "#2A2A38",

                        <div style={{ fontSize: 10, color: "#4A4A60" }}>

                        </div>
                      </div>

                    <div style={{ display: "flex", gap: 6 }}>
                      <button style={S.btnPri} onClick={() => { if (goalDateInput) saveGoal(goalDateInput, goalStartEpInput, goalEndEpInput); }}>設定する</button>
                      <button style={S.ghost} onClick={() => setShowGoalEdit(false)}>キャンセル</button>
                    </div>
                  </div>
                )}

                {goal && !showGoalEdit && pace && (
                  <div>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                      <span style={{ fontSize: 13, fontWeight: 700 }}>🎯 第{goal.startEp}話〜第{goal.endEp}話 / {(new Date(goal.targetDate).getMonth() + 1) + "/" + new Date(goal.targetDate).getDate()}まで</span>
                      <button style={{ background: "none", border: "none", color: "#4A4A60", fontSize: 11, cursor: "pointer", fontFamily: "'M PLUS Rounded 1c',sans-serif" }}

                    </div>

                    {pace.status === "done" ? (
                      <div style={{ padding: "8px 12px", borderRadius: 10, background: "#5DE8A015", border: "1px solid #5DE8A033", textAlign: "center" }}>
                        <span style={{ fontSize: 13, fontWeight: 700, color: "#5DE8A0" }}>🎉 {pace.msg}</span>
                      </div>
                    ) : (
                      <div>
                        {/* ─── Visual Timeline Bar ─── */}
                        <div style={{ position: "relative", margin: "8px 0 30px", padding: "0 4px" }}>
                          {/* Track */}
                          <div style={{ height: 8, background: "#2A2A38", borderRadius: 4, position: "relative", overflow: "visible" }}>
                            {/* Fill = done episodes */}
                            <div style={{ height: "100%", borderRadius: 4, background: "linear-gradient(90deg, #5DE8A060, " + pace.color + ")", transition: "width .5s", width: `${pace.totalCount > 0 ? Math.min(100, pace.doneCount / pace.totalCount * 100) : 0}%`, position: "absolute", top: 0, left: 0, zIndex: 2 }} />
                          </div>

                          {/* Milestone markers */}
                          {pace.milestones.map((m, i) => {
                            const left = m.pct;
                            return (
                              <div key={i} style={{ position: "absolute", left: `${left}%`, top: 0, transform: "translateX(-50%)", display: "flex", flexDirection: "column", alignItems: "center", zIndex: 3 }}>

                                <div style={{
                                  width: 14, height: 14, borderRadius: "50%",

                                  border: m.isDone ? "2px solid #5DE8A0" : "2px solid #2A2A38",
                                  marginTop: -3,

                          <div style={{

                            <span style={{ fontSize: 14 }}>{pace.status === "overdue" ? "🫧" : pace.status === "tight" ? "📦💨" : pace.status === "steady" ? "📦✨" : "📦🌿"}</span>
                            <span style={{ fontSize: 12, color: pace.color, fontWeight: 600 }}>{pace.msg}</span>
                          </div>
                          <div style={{ fontSize: 10, color: "#7E7E96", marginTop: 3 }}>

                        </div>
                      </div>

                    <button style={{ background: "none", border: "none", color: "#D4A4A4", fontSize: 10, cursor: "pointer", marginTop: 6, fontFamily: "'M PLUS Rounded 1c',sans-serif" }}

          {/* ─── Controls: Add + Sort + Hide ─── */}
          <div style={{ display: "flex", gap: 6, marginBottom: 10, alignItems: "center", flexWrap: "wrap" }}>
            <button style={{ padding: "8px 16px", fontSize: 12, flex: "none", borderRadius: 10, border: "1.5px solid #FF6B9D44", background: "#FF6B9D18", color: "#FF6B9D", fontWeight: 700, cursor: "pointer", fontFamily: "'M PLUS Rounded 1c',sans-serif" }} onClick={() => setAddingEp(true)}>＋ 新規エピソード</button>
            <div style={{ flex: 1 }} />
            <button style={{ ...S.ghost, fontSize: 10, padding: "5px 10px", color: reorderMode ? "#F7C948" : "#7E7E96", borderColor: reorderMode ? "#F7C94844" : "#2A2A38" }} onClick={() => setReorderMode(!reorderMode)}>
              {reorderMode ? "✓ 並び替え中" : "↕ 並び替え"}
            </button>
            {!reorderMode && <button style={{ ...S.ghost, fontSize: 10, padding: "5px 10px" }} onClick={() => setSortAsc(!sortAsc)}>
              {sortAsc ? "▲ 昇順" : "▼ 降順"}
            </button>}
            {!reorderMode && <button style={{ ...S.ghost, fontSize: 10, padding: "5px 10px", color: showOnlyCompleted ? "#5DE8A0" : "#7E7E96", borderColor: showOnlyCompleted ? "#5DE8A044" : "#2A2A38" }} onClick={() => setShowOnlyCompleted(!showOnlyCompleted)}>
              {showOnlyCompleted ? "✓ 完了を表示中" : "完了を表示"}
            </button>}
          </div>

          {/* Hidden count notice */}
          {addingEp && (
            <div style={{ background: "#1E1E28", borderRadius: 14, padding: "16px 14px", boxShadow: "0 1px 4px rgba(0,0,0,.04)", marginBottom: 10 }}>
              <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 12 }}>📦 新エピソード追加</div>
              <div style={{ marginBottom: 14, padding: "12px", borderRadius: 10, background: "#18181F", border: "1.5px dashed #2A2A38" }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#C4C4D4", marginBottom: 6 }}>📄 台本から読み込み</div>
                <div style={{ fontSize: 10, color: "#7E7E96", marginBottom: 8 }}>タイトルとコマ数（【C1】【C2】…）を自動検出します</div>
                {!showPaste ? (
                  <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                    <div style={{ display: "flex", gap: 6 }}>
                      <label style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 6, padding: "10px 14px", borderRadius: 8, background: "#1E1E28", border: "1.5px solid #2A2A38", cursor: "pointer", fontSize: 12, fontWeight: 600, color: "#C4C4D4" }}>
                        📂 ファイルを選択
                        <input type="file" accept=".md,.txt,.markdown,text/*" onChange={handleFileImport} style={{ display: "none" }} />
                      </label>
                      <button style={{ flex: 1, padding: "10px 14px", borderRadius: 8, background: "#1E1E28", border: "1.5px solid #2A2A38", cursor: "pointer", fontSize: 12, fontWeight: 600, color: "#C4C4D4", fontFamily: "'M PLUS Rounded 1c',sans-serif" }}
                        onClick={() => setShowPaste(true)}>📝 テキストを貼り付け</button>
                    </div>
                    <div style={{ fontSize: 9, color: "#4A4A60", textAlign: "center" }}>Google Driveのファイルもスマホのファイル選択から開けます</div>
                  </div>
                ) : (
                  <div>
                    <textarea style={{ width: "100%", minHeight: 120, padding: "10px 12px", borderRadius: 10, border: "1.5px solid #2A2A38", fontSize: 12, color: "#E4E4EE", background: "#1E1E28", resize: "vertical", lineHeight: 1.5, fontFamily: "'M PLUS Rounded 1c',sans-serif" }}
                      placeholder={"台本のテキストをここに貼り付けてね\n\n例:\n# 台本：「届くといいな」\n### ▼ PAGE 1（3コマ）\n**【C1】大ゴマ（上段）**\n**【C2】中ゴマ（下段右）**\n..."}
                      value={pasteText} onChange={e => setPasteText(e.target.value)} />
                    {pasteText.length > 10 && (() => {
                      const preview = parseScript(pasteText);
                      return (
                        <div style={{ marginTop: 8, padding: "8px 10px", borderRadius: 8, background: "#1E1E28", border: "1px solid #2A2A38" }}>
                          <div style={{ fontSize: 11, fontWeight: 700, color: "#C4C4D4", marginBottom: 4 }}>検出結果プレビュー</div>
                          <div style={{ fontSize: 12, fontWeight: 700, color: preview.title ? "#E4E4EE" : "#D4626A" }}>{preview.title || "（タイトル未検出）"}</div>
                          <div style={{ fontSize: 11, color: "#7E7E96", marginTop: 2 }}>{preview.panels.length > 0 ? `${preview.panels.length}コマ検出: ${preview.panels.map(p => p.label).join(", ")}` : "コマが検出できませんでした"}</div>
                        </div>
                      );
                    })()}
                    <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
                      <button style={S.btnPri} onClick={() => { if (pasteText.trim()) { importScript(pasteText); setPasteText(""); setShowPaste(false); } }}>読み込む</button>
                      <button style={S.ghost} onClick={() => { setShowPaste(false); setPasteText(""); }}>戻る</button>
                    </div>
                  </div>
                )}
              </div>
              <div style={{ fontSize: 11, color: "#4A4A60", fontWeight: 600, marginBottom: 8, textAlign: "center" }}>または手動で追加</div>
              <input style={S.input} placeholder="タイトル" value={newTitle} onChange={e => setNewTitle(e.target.value)} />
              <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 10, flexWrap: "wrap" }}>
                <label style={{ display: "flex", flexDirection: "column", gap: 4, fontSize: 11, color: "#7E7E96", fontWeight: 600 }}>
                  タイプ
                  <div style={{ display: "flex", gap: 4 }}>
                    {POST_TYPES.map(t => {
                      const active = newPostType === t.id;
                      return <button key={t.id} onClick={() => setNewPostType(t.id)}
                        style={{ background: active ? t.color + "22" : "transparent", color: active ? t.color : "#4A4A60", border: "1px solid " + (active ? t.color + "44" : "#2A2A38"), borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontSize: 11, fontFamily: "'M PLUS Rounded 1c',sans-serif", display: "flex", alignItems: "center", gap: 4 }}>
                        <span>{t.icon}</span><span>{t.label}</span>
                      </button>;
                    })}
                  </div>
                </label>
                {newPostType === "manga" && (
                  <label style={{ display: "flex", flexDirection: "column", gap: 4, fontSize: 11, color: "#7E7E96", fontWeight: 600 }}>
                    コマ数
                    <select style={S.sel} value={newPanelCount} onChange={e => setNewPanelCount(+e.target.value)}>
                      {[3, 4, 5, 6, 7, 8, 9, 10, 12].map(n => <option key={n} value={n}>{n}コマ</option>)}
                    </select>
                  </label>
                )}
              </div>
              <div style={{ fontSize: 10, color: "#4A4A60", marginBottom: 10 }}>{newPostType === "manga" ? "※ 工程（下書き〜ラベルカード）は自動生成。コマ名は後から編集可" : "※ 工程（下書き〜ラベルカード）は自動生成"}</div>
              <div style={{ display: "flex", gap: 8 }}>
                <button style={S.btnPri} onClick={addEpisode}>追加する</button>
                <button style={S.ghost} onClick={() => { setAddingEp(false); setShowPaste(false); setPasteText(""); }}>キャンセル</button>
              </div>
            </div>
          )}

          {(() => {
            let displayEps = episodes.map((ep, i) => ({ ...ep, _origIndex: i }));
            if (!reorderMode && showOnlyCompleted) displayEps = displayEps.filter(e => e.allDone);
            if (!reorderMode && !sortAsc) displayEps = [...displayEps].reverse();
            return displayEps;
          })().map((ep, ei) => {
            const { done: dc, total: dt } = countAllDone(ep);
            const pct = dt > 0 ? Math.round(dc / dt * 100) : 0;
            const isOpen = activeEp === ep.id;
            const isEdit = editingEp === ep.id;
            const next = getNextTask(ep);
            const secs = totalSeconds(ep);
            const timedCount = Object.values(ep.seconds || {}).filter(v => v > 0).length;
            const pace = calcPace(episodes, data.goal);
            const milestone = pace?.milestones?.find(m => m.epId === ep.id);

            const epStatus = deriveStatus(ep);
            const sts = sMap[epStatus] || sMap.none;
            const pt = ptMap[ep.postType] || ptMap.manga;

            return (
              <div key={ep.id} style={{ ...S.epCard, animation: reorderMode ? "none" : `slideIn .25s ease ${ei * .04}s both`, border: reorderMode ? "1px solid #F7C94833" : "none" }}>
                <div style={S.epHead} onClick={() => { if (!reorderMode) setActiveEp(isOpen ? null : ep.id); }}>
                  {reorderMode && (
                    <div style={{ display: "flex", alignItems: "center", gap: 4, marginRight: 6 }}>
                      <input type="number" min={1} max={episodes.length} value={ep._origIndex + 1}
                        onClick={e => e.stopPropagation()}
                        onChange={e => { const v = parseInt(e.target.value); if (v >= 1 && v <= episodes.length) moveEpTo(ep.id, v); }}
                        style={{ width: 38, height: 30, borderRadius: 6, border: "1.5px solid #F7C94844", background: "#18181F", color: "#F7C948", fontSize: 13, fontWeight: 700, textAlign: "center", fontFamily: "'Share Tech Mono',monospace", padding: 0, outline: "none" }} />
                    </div>
                  )}
                  <div style={{ display: "flex", alignItems: "center", gap: 10, flex: 1, minWidth: 0 }}>
                    <div style={{ ...S.epIco, background: pt.color + "15" }}>
                      <span style={{ fontSize: 16 }}>{pt.icon}</span>
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 2 }}>
                        <span style={{ fontSize: 10, color: "#4A4A60", fontWeight: 700, fontFamily: "'Share Tech Mono',monospace" }}>#{ep._origIndex + 1}</span>
                        <span style={{ fontSize: 13, fontWeight: 700, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{ep.title}</span>
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
                        <span style={{ fontSize: 10, padding: "1px 8px", borderRadius: 4, background: sts.bg, color: sts.color, fontWeight: 600, border: "1px solid " + sts.color + "44" }}>{sts.label}</span>
                        <span style={{ fontSize: 10, color: "#4A4A60" }}>{dc}/{dt}タスク</span>
                        {secs > 0 && <span style={{ fontSize: 10, color: "#4A4A60" }}>⏱{fmtTime(secs)}</span>}
                        {milestone && !ep.allDone && <span style={{ fontSize: 10, color: "#4A4A60" }}>📅{milestone.dateStr}</span>}
                      </div>
                      {stopwatch?.epId === ep.id && (
                        <span style={{ fontSize: 10, padding: "1px 8px", borderRadius: 4, background: "#F2A7B020", color: "#F2A7B0", fontWeight: 700, border: "1px solid #F2A7B044", marginTop: 2 }}>⏱ タイマー中</span>
                      )}
                    </div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 6, flexShrink: 0 }}>
                    <span style={{ fontSize: 13, fontWeight: 800, fontFamily: "'Share Tech Mono',monospace", color: ep.allDone ? "#5DE8A0" : pct > 0 ? "#F2A7B0" : "#4A4A60" }}>{pct}%</span>
                    {!reorderMode && <span style={{ fontSize: 12, color: "#4A4A60", transform: isOpen ? "rotate(180deg)" : "none", transition: ".2s" }}>▼</span>}
                  </div>
                </div>
                <div style={{ height: 3, background: "#2A2A38", margin: "0 14px" }}><div style={{ height: "100%", width: `${pct}%`, background: ep.allDone ? "#5DE8A060" : sts.color + "88", borderRadius: 2, transition: "width .5s" }} /></div>

                {isOpen && (
                  <div style={{ padding: "8px 14px 14px" }}>
                    {/* Episode timer */}
                    {!isEdit && !ep.allDone && (
                      stopwatch?.epId === ep.id ? (
                        <div style={{ marginBottom: 10, borderRadius: 12, background: "#1E1820", border: "1.5px solid #F2A7B044", overflow: "hidden" }}>
                          <div style={{ ...S.conveyor, height: 4, animationPlayState: stopwatch.running ? "running" : "paused" }} />
                          <div style={{ padding: "12px 14px", textAlign: "center" }}>
                            <span style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 32, fontWeight: 700, color: stopwatch.running ? "#E4E4EE" : "#7E7E96", letterSpacing: 2, display: "block", marginBottom: 4, animation: stopwatch.running ? "glowPulse 2s ease infinite" : "none" }}>{fmtTimer(elapsed)}</span>
                            <span style={{ fontSize: 10, color: stopwatch.running ? "#F2A7B0" : "#7E7E96", fontWeight: 600 }}>{stopwatch.running ? "作業中…" : "一時停止中"}</span>
                            <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
                              {stopwatch.running ? (
                                <button style={{ ...S.btnPause, flex: 1, padding: 10, fontSize: 13 }} onClick={e => { e.stopPropagation(); pauseStopwatch(); }}>⏸ 一時停止</button>
                              ) : (
                                <button style={{ ...S.btnDone, flex: 1, padding: 10, fontSize: 13 }} onClick={e => { e.stopPropagation(); resumeStopwatch(); }}>▶ 再開</button>
                              )}
                              <button style={{ ...S.btnStop, padding: 10, fontSize: 12 }} onClick={e => { e.stopPropagation(); stopStopwatch(); }}>⏹ 終了</button>
                            </div>
                          </div>
                        </div>
                      ) : !stopwatch && (
                        <button style={{ ...S.startSwBtn, marginBottom: 10, fontSize: 12, padding: "10px 14px" }} onClick={e => { e.stopPropagation(); startStopwatch(ep.id); }}>
                          ▶ タイマー開始
                        </button>
                      )
                    )}
                    {/* Next task hint */}
                    {next && !isEdit && (
                      <div style={{ padding: "6px 12px", marginBottom: 10, borderRadius: 8, background: "#F2A7B010", border: "1px solid #F2A7B033", fontSize: 11, color: "#F2A7B0", fontWeight: 600 }}>
                        次：{next.phase.icon} {next.phase.label}{next.panelLabel ? " → " + next.panelLabel : ""}
                      </div>
                    )}

                    {PHASES.map(ph => {
                      const prog = getPhaseProgress(ep, ph.id);
                      const phPct = prog.total > 0 ? Math.round(prog.done / prog.total * 100) : 0;
                      const allPh = prog.done >= prog.total;

                      return (
                        <div key={ph.id} style={{ marginBottom: 12 }}>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                            <span style={{ fontSize: 13, fontWeight: 700, color: allPh ? "#5DE8A0" : "#C4C4D4" }}>
                              {ph.icon} {ph.label}<span style={{ fontSize: 10, color: "#4A4A60", fontWeight: 400, marginLeft: 6 }}>{ph.desc}</span>
                            </span>
                            <span style={{ fontSize: 11, fontFamily: "'Share Tech Mono',monospace", color: allPh ? "#5DE8A0" : "#4A4A60" }}>{prog.done}/{prog.total}</span>
                          </div>
                          <div style={{ height: 4, background: "#2A2A38", borderRadius: 2, overflow: "hidden", marginBottom: 6 }}>
                            <div style={{ height: "100%", borderRadius: 2, transition: "width .4s", width: `${phPct}%`, background: allPh ? "#5DE8A060" : ph.id === "color" ? "#5EB5F7" : "#F2A7B0" }} />
                          </div>

                          {ph.unit === "batch" && (
                            <div>
                              <button style={ep.done[ph.id] ? S.taskDone : S.taskUndone} onClick={e => { e.stopPropagation(); if (ep.done[ph.id]) toggleTask(ep.id, ph.id); else markDone(ep.id, ph.id); }}>
                                {ep.done[ph.id] ? <span style={{ fontWeight: 800, fontSize: 14, color: "#5DE8A0" }}>✓</span> : <span style={{ color: "#7E7E96", fontSize: 14 }}>○</span>}
                                <span style={{ color: ep.done[ph.id] ? "#9E9E9E" : "#C4C4D4" }}>{ep.done[ph.id] ? "完了" : "済にする"}</span>
                              </button>
                            </div>
                          )}

                          {ph.unit === "panel" && (
                            <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                              {ep.panels.map(panel => {
                                const tKey = ph.id + ":" + panel.id;
                                const isDone = !!ep.done[tKey];

                                if (isEdit && ph.id === "color") {
                                  return (
                                    <div key={panel.id} style={{ display: "flex", gap: 4, marginBottom: 4 }}>
                                      <input style={S.editIn} value={panel.label} onChange={e => renamePanelLabel(ep.id, panel.id, e.target.value)} onClick={e => e.stopPropagation()} />
                                      <button style={S.editDel} onClick={e => { e.stopPropagation(); removePanel(ep.id, panel.id); }}>✕</button>
                                    </div>
                                  );
                                }

                                return (
                                  <div key={panel.id}>
                                    <button style={{ ...S.pBtn, background: isDone ? "#5DE8A010" : "#18181F", borderColor: isDone ? "#5DE8A044" : "#2A2A38" }}
                                      onClick={e => { e.stopPropagation(); if (isDone) toggleTask(ep.id, tKey); else markDone(ep.id, tKey); }}>
                                      {isDone ? <span style={{ color: "#5DE8A0", fontWeight: 800, fontSize: 12 }}>✓</span> : <span style={{ color: "#7E7E96", fontSize: 11 }}>○</span>}
                                      <span style={{ fontWeight: 600, fontSize: 11, color: isDone ? "#9E9E9E" : "#C4C4D4", textDecoration: isDone ? "line-through" : "none" }}>{panel.label}</span>
                                    </button>
                                  </div>
                                );
                              })}
                              {isEdit && ph.id === "color" && (
                                <button style={{ padding: "6px 10px", borderRadius: 8, border: "1.5px dashed #2A2A38", background: "transparent", color: "#4A4A60", fontSize: 11, cursor: "pointer" }}
                                  onClick={e => { e.stopPropagation(); addPanel(ep.id); }}>+ コマ追加</button>
                              )}
                              {!isEdit && !allPh && prog.done < prog.total && (
                                <button style={S.bulkBtn}
                                  onClick={e => { e.stopPropagation(); bulkCompletePhase(ep.id, ph.id); }}>
                                  ✓ まとめて完了
                                </button>
                              )}
                            </div>
                          )}
                        </div>
                      );
                    })}

                    {/* ─── Basic Info Section ─── */}
                    <div style={{ marginTop: 12, paddingTop: 12, borderTop: "1px solid #2A2A38" }}>
                      <div style={{ fontSize: 11, fontWeight: 700, color: "#7E7E96", marginBottom: 8 }}>📋 基本情報</div>
                      <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 8, flexWrap: "wrap" }}>
                        <span style={{ fontSize: 11, color: "#4A4A60" }}>タイプ</span>
                        {POST_TYPES.map(t => {
                          const active = (ep.postType || "manga") === t.id;
                          return <button key={t.id} onClick={e => { e.stopPropagation(); updateEp(ep.id, { postType: t.id }); }}
                            style={{ background: active ? t.color + "22" : "transparent", color: active ? t.color : "#4A4A60", border: "1px solid " + (active ? t.color + "44" : "#2A2A38"), borderRadius: 6, padding: "3px 10px", cursor: "pointer", fontSize: 11, fontFamily: "'M PLUS Rounded 1c',sans-serif", display: "flex", alignItems: "center", gap: 4 }}>
                            <span>{t.icon}</span><span>{t.label}</span>
                          </button>;
                        })}
                      </div>
                      <div style={{ marginBottom: 8 }}>
                        <span style={{ fontSize: 11, color: "#4A4A60", display: "block", marginBottom: 3 }}>メモ</span>
                        <textarea value={ep.scriptMemo || ""} onChange={e => { e.stopPropagation(); updateEp(ep.id, { scriptMemo: e.target.value }); }} onClick={e => e.stopPropagation()}
                          placeholder="アイデアメモ・話の骨子…" rows={2}
                          style={{ ...S.input, marginBottom: 0, fontSize: 12, resize: "vertical", minHeight: 40 }} />
                      </div>
                    </div>

                    <div style={{ display: "flex", gap: 8, marginTop: 10, paddingTop: 10, borderTop: "1px solid #2A2A38" }}>
                      <button style={S.ghost} onClick={e => { e.stopPropagation(); setEditingEp(isEdit ? null : ep.id); }}>{isEdit ? "✓ 編集完了" : "✏ コマ名編集"}</button>
                      <button style={{ ...S.ghost, color: "#D4626A", borderColor: "#D4626A44" }} onClick={e => { e.stopPropagation(); if (confirm("「" + ep.title + "」を削除？")) deleteEp(ep.id); }}>🗑 削除</button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}


          <div style={{ height: 32 }} />
        </div>
      )}

      {/* ═══ Stats Tab ═══ */}
      {tab === "stats" && (() => {
        const completedEps = episodes.filter(e => e.allDone && totalSeconds(e) > 0);
        const avgPerTask = globalDone > 0 ? Math.round(globalSec / globalDone) : 0;

        // Per-phase averages
        const phaseStats = PHASES.map(ph => {
          let totalSec = 0, count = 0;
          episodes.forEach(ep => {
            if (ph.unit === "batch") {
              if (ep.seconds[ph.id]) { totalSec += ep.seconds[ph.id]; count++; }
            } else {
              ep.panels.forEach(p => {
                const k = ph.id + ":" + p.id;
                if (ep.seconds[k]) { totalSec += ep.seconds[k]; count++; }
              });
            }
          });
          return { ...ph, totalSec, count, avg: count > 0 ? Math.round(totalSec / count) : 0 };
        });

        // Per-episode summary (include any ep with at least 1 done task)
        const epSummaries = episodes.filter(e => countAllDone(e).done > 0 && e.id !== "ep1").map(ep => {
          const secs = totalSeconds(ep);
          const { done: dc, total: dt } = countAllDone(ep);
          const timedCount = Object.values(ep.seconds || {}).filter(v => v > 0).length;
          const phaseBreakdown = PHASES.map(ph => {
            let s = 0;
            if (ph.unit === "batch") { s = ep.seconds[ph.id] || 0; }
            else { ep.panels.forEach(p => { s += ep.seconds[ph.id + ":" + p.id] || 0; }); }
            return { label: ph.icon + " " + ph.label, seconds: s };
          }).filter(p => p.seconds > 0);
          return { ep, secs, dc, dt, timedCount, phaseBreakdown };
        });

        // Latest completed ep for "直近1話"
        const latestDone = [...completedEps].pop();
        const latestSummary = latestDone ? epSummaries.find(s => s.ep.id === latestDone.id) : null;

        return (
          <div style={{ padding: "4px 16px 32px" }}>
            {/* ── Overview ── */}
            <div style={{ background: "#1E1E28", borderRadius: 14, padding: "14px", marginBottom: 8, boxShadow: "0 1px 4px rgba(0,0,0,.03)" }}>
              <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 10 }}>📊 全体サマリー</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                {[
                  { v: fmtTime(avgPerTask), l: "平均/タスク" },
                  { v: (data.activeDays || []).length + "日", l: "累計稼働日" },
                  { v: String(data.totalCompleted || 0), l: "累計タスク" },
                ].map((s, i) => (
                  <div key={i} style={{ textAlign: "center", padding: "8px 4px", background: "#111116", borderRadius: 10 }}>
                    <div style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 18, fontWeight: 700, color: "#E4E4EE" }}>{s.v}</div>
                    <div style={{ fontSize: 10, color: "#7E7E96" }}>{s.l}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* ── Phase Averages ── */}
            <div style={{ background: "#1E1E28", borderRadius: 14, padding: "14px", marginBottom: 8, boxShadow: "0 1px 4px rgba(0,0,0,.03)" }}>
              <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 10 }}>⏱ 工程別の平均時間</div>
              {phaseStats.map(ps => {
                const maxSec = Math.max(...phaseStats.map(p => p.avg), 1);
                return (
                  <div key={ps.id} style={{ marginBottom: 8 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 2 }}>
                      <span style={{ fontSize: 12, fontWeight: 600 }}>{ps.icon} {ps.label}</span>
                      <span style={{ fontSize: 11, fontFamily: "'Share Tech Mono',monospace", color: ps.avg > 0 ? "#C4C4D4" : "#4A4A60" }}>
                        {ps.avg > 0 ? fmtTime(ps.avg) : "—"}<span style={{ fontSize: 9, color: "#4A4A60", marginLeft: 4 }}>({ps.count}回)</span>
                      </span>
                    </div>
                    <div style={{ height: 6, background: "#2A2A38", borderRadius: 3, overflow: "hidden" }}>
                      <div style={{ height: "100%", borderRadius: 3, transition: "width .4s", width: `${ps.avg > 0 ? (ps.avg / maxSec * 100) : 0}%`, background: ps.id.includes("color") ? "#5EB5F7" : ps.id === "finish" ? "#5DE8A060" : "#F2A7B0" }} />
                    </div>
                  </div>
                );
              })}
              {phaseStats.every(p => p.avg === 0) && <div style={{ fontSize: 11, color: "#4A4A60", textAlign: "center", padding: 8 }}>タイマーで作業するとここにデータが貯まります</div>}
            </div>

            {/* ── Latest Episode ── */}
            {latestSummary && (
              <div style={{ background: "#1E1E28", borderRadius: 14, padding: "14px", marginBottom: 8, boxShadow: "0 1px 4px rgba(0,0,0,.03)" }}>
                <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 10 }}>📖 直近1話：{latestSummary.ep.title}</div>
                <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 8 }}>
                  <span style={{ fontSize: 20, fontWeight: 800, fontFamily: "'Share Tech Mono',monospace", color: latestSummary.secs > 0 ? "#F2A7B0" : "#4A4A60" }}>
                    {latestSummary.secs > 0 ? fmtTime(latestSummary.secs) : "計測なし"}
                  </span>
                  {latestSummary.secs > 0 && <span style={{ fontSize: 10, color: "#4A4A60" }}>({latestSummary.timedCount}/{latestSummary.dc}タスク計測)</span>}
                </div>
                {latestSummary.phaseBreakdown.length > 0 && (
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                    {latestSummary.phaseBreakdown.map((pb, i) => (
                      <div key={i} style={{ fontSize: 10, padding: "4px 8px", borderRadius: 6, background: "#111116", color: "#7E7E96" }}>
                        {pb.label} <span style={{ fontFamily: "'Share Tech Mono',monospace", fontWeight: 700 }}>{fmtTime(pb.seconds)}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* ── Per-Episode Times ── */}
            {epSummaries.length > 0 && (
              <div style={{ background: "#1E1E28", borderRadius: 14, padding: "14px", marginBottom: 8, boxShadow: "0 1px 4px rgba(0,0,0,.03)" }}>
                <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 10 }}>📈 話ごとの作業時間</div>
                {epSummaries.map((es, i) => {
                  const maxEpSec = Math.max(...epSummaries.map(e => e.secs).filter(s => s > 0), 1);
                  return (
                    <div key={es.ep.id} style={{ marginBottom: 8 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 2 }}>
                        <span style={{ fontSize: 11, fontWeight: 600, maxWidth: "55%", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{es.ep.title}</span>
                        <span style={{ fontSize: 11, fontFamily: "'Share Tech Mono',monospace", color: es.ep.allDone ? "#5DE8A0" : "#C4C4D4" }}>
                          {es.secs > 0 ? fmtTime(es.secs) : "計測なし"}
                          {es.ep.allDone && " ✓"}
                          {es.secs > 0 && <span style={{ fontSize: 9, color: "#4A4A60", marginLeft: 3 }}>({es.timedCount}/{es.dc})</span>}
                        </span>
                      </div>
                      {es.secs > 0 ? (
                        <div style={{ height: 8, background: "#2A2A38", borderRadius: 4, overflow: "hidden", display: "flex" }}>
                          {es.phaseBreakdown.map((pb, j) => {
                            const w = es.secs > 0 ? (pb.seconds / es.secs * 100) : 0;
                            const colors = { "✏️ 下書き": "#F2A7B0", "🖊️ ペン入れ": "#A78BFA", "🎨 塗り": "#5EB5F7", "✨ 仕上げ": "#5DE8A060" };
                            return <div key={j} style={{ height: "100%", width: `${w}%`, background: colors[pb.label] || "#2A2A38", transition: "width .4s" }} />;
                          })}
                        </div>
                      ) : (
                        <div style={{ height: 8, background: "#2A2A38", borderRadius: 4 }}>
                          <div style={{ height: "100%", width: `${es.dc / es.dt * 100}%`, background: "#2A2A38", borderRadius: 4 }} />
                        </div>
                      )}
                      <div style={{ fontSize: 9, color: "#4A4A60", marginTop: 2 }}>{es.dc}/{es.dt}タスク完了</div>
                    </div>
                  );
                })}
                {/* Legend */}
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 8 }}>
                  {[{ l: "下書き", c: "#F2A7B0" }, { l: "ペン入れ", c: "#A78BFA" }, { l: "塗り", c: "#5EB5F7" }, { l: "仕上げ", c: "#5DE8A060" }].map(x => (
                    <div key={x.l} style={{ display: "flex", alignItems: "center", gap: 3 }}>
                      <div style={{ width: 8, height: 8, borderRadius: 2, background: x.c }} />
                      <span style={{ fontSize: 9, color: "#7E7E96" }}>{x.l}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* ── Achievements ── */}
            <div style={{ background: "#1E1E28", borderRadius: 14, padding: "14px", marginBottom: 8, boxShadow: "0 1px 4px rgba(0,0,0,.03)" }}>
              <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 10 }}>🏆 アチーブメント <span style={{ fontSize: 11, color: "#F2A7B0", fontWeight: 800 }}>{(data.unlockedAchievements || []).length}/{ACHIEVEMENTS.length}</span></div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
                {ACHIEVEMENTS.map(ach => {
                  const unlocked = (data.unlockedAchievements || []).includes(ach.id);
                  return (
                    <div key={ach.id} style={{
                      padding: "8px 10px", borderRadius: 10,
                      background: unlocked ? "#F5D5A015" : "#18181F",
                      border: unlocked ? "1.5px solid #F5D5A044" : "1.5px solid #2A2A38",
                      opacity: unlocked ? 1 : 0.5,
                    }}>
                      <div style={{ fontSize: 18, marginBottom: 2 }}>{ach.icon}</div>
                      <div style={{ fontSize: 11, fontWeight: 700, color: unlocked ? "#E4E4EE" : "#4A4A60" }}>{ach.label}</div>
                      <div style={{ fontSize: 9, color: "#7E7E96" }}>{ach.desc}</div>
                    </div>
                  );
                })}
              </div>
            </div>

            <div style={{ textAlign: "center", padding: "16px 0 32px" }}>
              <button style={{ padding: "6px 16px", borderRadius: 20, border: "1px solid #2A2A38", background: "transparent", color: "#4A4A60", fontSize: 10, cursor: "pointer", fontFamily: "'M PLUS Rounded 1c',sans-serif" }} onClick={resetAll}>データリセット</button>
            </div>
          </div>
        );
      })()}

      {celebration && (
        <div style={{
          position: "fixed", top: 60, left: "50%", transform: "translateX(-50%)",
          zIndex: 150, pointerEvents: "none",
          background: celebration === "episode" ? "linear-gradient(135deg,#1E1820,#1E1E28)" : "#1E1E28",
          borderRadius: 14, padding: "10px 20px",
          boxShadow: "0 4px 20px rgba(0,0,0,.1)",
          border: celebration === "episode" ? "2px solid #F2A7B0" : "1.5px solid #5DE8A060",
          display: "flex", alignItems: "center", gap: 10,
          animation: "toastIn .3s ease both",
          maxWidth: "90%",
        }}>
          <span style={{ fontSize: celebration === "episode" ? 28 : 22 }}>{celebration === "episode" ? "🎉" : "🏁"}</span>
          <span style={{ fontSize: 13, fontWeight: 700, color: "#E4E4EE" }}>{celebration === "episode" ? "1話ぶん 処理完了！！" : "工程クリア！次へ！"}</span>
        </div>
      )}
      {newAchievement && (
        <div style={{
          position: "fixed", top: celebration ? 110 : 60, left: "50%", transform: "translateX(-50%)",
          zIndex: 160, pointerEvents: "none",
          background: "linear-gradient(135deg,#2A2A38,#1E1E28)",
          borderRadius: 14, padding: "10px 20px",
          boxShadow: "0 4px 20px rgba(245,213,160,.15)",
          border: "2px solid #F5D5A066",
          display: "flex", alignItems: "center", gap: 10,
          animation: "toastIn .3s ease both",
          maxWidth: "90%",
        }}>
          <span style={{ fontSize: 24 }}>{newAchievement.icon}</span>
          <div>
            <div style={{ fontSize: 10, color: "#C4A46C", fontWeight: 700 }}>🏆 解放！</div>
            <div style={{ fontSize: 13, fontWeight: 700, color: "#E4E4EE" }}>{newAchievement.label}</div>
          </div>
        </div>
      )}
    </div>
  );
}

function Confetti({ active, big }) {
  if (!active) return null;
  const ps = Array.from({ length: big ? 24 : 10 }, (_, i) => ({ i, x: Math.random() * 100, d: Math.random() * .3, dur: .6 + Math.random() * .8, c: ["#F2A7B0", "#5EB5F7", "#5DE8A060", "#F5D5A0", "#A78BFA", "#FFB7C5"][i % 6], s: 3 + Math.random() * (big ? 7 : 5) }));
  return <div style={{ position: "fixed", inset: 0, pointerEvents: "none", zIndex: 200 }}>
    {ps.map(p => <div key={p.i} style={{ position: "absolute", left: p.x + "%", top: -10, width: p.s, height: p.s, borderRadius: Math.random() > .5 ? "50%" : "2px", background: p.c, animation: `confettiFall ${p.dur}s ease-in ${p.d}s forwards` }} />)}
  </div>;
}
