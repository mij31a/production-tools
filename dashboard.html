// --- GAS Sync (data read/write only) ---
async function gasGet(url) {
  const res = await fetch(url, { redirect: "follow" });
  const json = await res.json();
  if (json.success && json.data) return json.data;
  return null;
}

async function gasPost(url, data) {
  await fetch(url, {
    method: "POST",
    redirect: "follow",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({ action: "save", data }),
  });
}

function copyToClip(text) { try { navigator.clipboard.writeText(text); } catch(e){} }

function addDaysTo(ds, n) { const d = new Date(ds); d.setDate(d.getDate() + n); return d.toISOString().split("T")[0]; }
function toISO(d) { return d.toISOString().split("T")[0]; }
function fmtDate(d) { if (!d) return "\u2014"; const t = new Date(d), w = ["日","月","火","水","木","金","土"]; return (t.getMonth()+1)+"/"+t.getDate()+"("+w[t.getDay()]+")"; }
function daysBetween(a, b) { return Math.round((new Date(b) - new Date(a)) / 86400000); }
function isSunday(d) { return new Date(d).getDay() === 0; }

function deriveStatus(ep) {
  const st = ep.steps || {}, ss = ep.snsState || {};
  const allPosted = SNS_LIST.every(s => ss[s.id] === "posted");
  const allScheduled = SNS_LIST.every(s => ss[s.id] === "scheduled");
  if (allPosted) return "posted";
  if (allScheduled) return "scheduled";
  if (ep.postDate) return "done";
  if (st.plot) return "plot";
  return "none";
}

// Auto-check scheduled -> posted based on delivery times
function autoUpdateSnsState(ep) {
  if (!ep.postDate) return ep.snsState || {};
  const now = new Date();
  const ss = { ...(ep.snsState || {}) };
  const xDate = new Date(ep.postDate + "T19:50:00");
  const thDate = new Date(ep.postDate + "T19:50:00");
  const igDate = new Date(addDaysTo(ep.postDate, 1) + "T12:00:00");
  const ttDate = new Date(addDaysTo(ep.postDate, 1) + "T18:00:00");
  const times = { x: xDate, threads: thDate, ig: igDate, tiktok: ttDate };
  for (const sns of SNS_LIST) {
    if (ss[sns.id] === "scheduled" && times[sns.id] && now >= times[sns.id]) {
      ss[sns.id] = "posted";
    }
  }
  return ss;
}

function getDeliverySchedule(ep) {
  if (!ep.postDate) return [];
  return [
    { sns: "x", date: ep.postDate, time: "19:50", label: "X" },
    { sns: "threads", date: ep.postDate, time: "19:50", label: "Threads" },
    { sns: "ig", date: addDaysTo(ep.postDate, 1), time: "12:00", label: "IG" },
    { sns: "tiktok", date: addDaysTo(ep.postDate, 1), time: "18:00", label: "TikTok" },
  ];
}

// Generate data input tasks for today
function generateTasks(eps, today, weeklyFollowers, dismissedTasks, dnMap) {
  const tasks = [];
  const dismissed = dismissedTasks || [];
  function dn(ep) { return (dnMap || {})[ep.id] || "?"; }
  for (const ep of eps) {
    if (!ep.postDate) continue;
    const xDate = ep.postDate;
    const igDate = addDaysTo(ep.postDate, 1);
    const daysFromX = daysBetween(xDate, today);
    const daysFromIG = daysBetween(igDate, today);

    // X/Threads 24h check (1+ day after X post date, show until filled)
    if (daysFromX >= 1) {
      const taskKeyX = ep.id + "-x-d1";
      const xm = ep.snsMetrics?.x?.d1 || {};
      const isEmpty = !SNS_METRICS.x.fields.some(f => xm[f.key]);
      if (isEmpty && !dismissed.includes(taskKeyX)) {
        const overdue = daysFromX > 1;
        tasks.push({ type: "input", ep, sns: "x", timing: "24h", pri: 3, key: taskKeyX, label: `ep.${dn(ep)} X数値入力（24h${overdue ? " ⚠" + daysFromX + "日経過" : "経過"}）` });
      }
      const taskKeyTh = ep.id + "-threads-d1";
      const tm = ep.snsMetrics?.threads?.d1 || {};
      const tEmpty = !SNS_METRICS.threads.fields.some(f => tm[f.key]);
      if (tEmpty && !dismissed.includes(taskKeyTh)) tasks.push({ type: "input", ep, sns: "threads", timing: "24h", pri: 1, key: taskKeyTh, label: `ep.${dn(ep)} Threads数値入力（24h経過）` });
    }
    // IG/TikTok 7d check (7+ days after IG post date, show until filled)
    if (daysFromIG >= 7) {
      const taskKeyIG = ep.id + "-ig-d7";
      const igm = ep.snsMetrics?.ig?.d7 || {};
      const igEmpty = !SNS_METRICS.ig.fields.some(f => igm[f.key]);
      if (igEmpty && !dismissed.includes(taskKeyIG)) tasks.push({ type: "input", ep, sns: "ig", timing: "7d", pri: 3, key: taskKeyIG, label: `ep.${dn(ep)} IG数値入力（7日経過）` });
      const taskKeyTT = ep.id + "-tiktok-d7";
      const ttm = ep.snsMetrics?.tiktok?.d7 || {};
      const ttEmpty = !SNS_METRICS.tiktok.fields.some(f => ttm[f.key]);
      if (ttEmpty && !dismissed.includes(taskKeyTT)) tasks.push({ type: "input", ep, sns: "tiktok", timing: "7d", pri: 2, key: taskKeyTT, label: `ep.${dn(ep)} TikTok数値入力（7日経過）` });
    }
    // IG 30d save check (30+ days, show until filled)
    if (daysFromIG >= 30) {
      const taskKey30 = ep.id + "-ig-d30";
      const igm30 = ep.snsMetrics?.ig?.d30 || {};
      const ig30Empty = !igm30.saves;
      if (ig30Empty && !dismissed.includes(taskKey30)) tasks.push({ type: "input", ep, sns: "ig", timing: "30d", pri: 3, key: taskKey30, label: `ep.${dn(ep)} IG保存数更新（30日経過）` });
    }
  }
  // Weekly follower check (Sunday)
  if (isSunday(today)) {
    const thisWeek = weeklyFollowers?.find(w => w.date === today);
    if (!thisWeek) tasks.push({ type: "followers", pri: 3, key: "followers-" + today, label: "週次フォロワー記録" });
  }
  tasks.sort((a, b) => b.pri - a.pri);
  return tasks;
}

function CalendarPicker({ value, onChange, label }) {
  const [open, setOpen] = useState(false);
  const [vd, setVd] = useState(() => value ? new Date(value) : new Date());
  const ref = useRef(null);
  useEffect(() => { function h(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); } document.addEventListener("mousedown", h); return () => document.removeEventListener("mousedown", h); }, []);
  const y = vd.getFullYear(), mo = vd.getMonth();
  const fd = new Date(y, mo, 1).getDay(), dim = new Date(y, mo + 1, 0).getDate();
  const today = toISO(new Date());
  const days = []; for (let i = 0; i < fd; i++) days.push(null); for (let i = 1; i <= dim; i++) days.push(i);
  const mN = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
  const wD = ["日","月","火","水","木","金","土"];
  function sel(day) { onChange(y + "-" + String(mo+1).padStart(2,"0") + "-" + String(day).padStart(2,"0")); setOpen(false); }
  return <div ref={ref} style={{ position: "relative", display: "inline-block" }}>
    <button onClick={() => setOpen(!open)} style={{ ...inputS, cursor: "pointer", display: "flex", alignItems: "center", gap: 8, minWidth: 130, justifyContent: "space-between" }}>
      <span>{value ? fmtDate(value) : (label || "日付を選択")}</span><span style={{ fontSize: 10, color: C.sub }}>📅</span>
    </button>
    {open && <div style={{ position: "absolute", top: "100%", left: 0, zIndex: 100, marginTop: 4, background: C.card, border: "1px solid " + C.border, borderRadius: 12, padding: 12, width: 260, boxShadow: "0 12px 40px rgba(0,0,0,.5)" }}>

// --- 2-COLUMN SCHEDULE TIMELINE ---
function ScheduleTimeline({ eps, onOpenId, openId, dn }) {
  const dated = eps.filter(e => e.postDate).sort((a, b) => a.postDate.localeCompare(b.postDate));
  if (dated.length === 0) return <div style={{ textAlign: "center", padding: 40, color: C.dim }}>投稿日が設定されたエピソードがありません</div>;

  // Build date map: X/Threads = postDate, IG/TikTok = postDate + 1
  const groupA = {}; // date -> ep (X + Threads)
  const groupB = {}; // date -> ep (IG + TikTok, one day after)
  dated.forEach(ep => {
    groupA[ep.postDate] = ep;
    groupB[addDaysTo(ep.postDate, 1)] = ep;
  });

  // Collect all dates
  const allDatesSet = new Set();
  Object.keys(groupA).forEach(d => allDatesSet.add(d));
  Object.keys(groupB).forEach(d => allDatesSet.add(d));
  const allDays = Array.from(allDatesSet).sort();
  // Fill gaps
  if (allDays.length > 1) {
    const filled = [];
    let cur = allDays[0];
    const last = allDays[allDays.length - 1];
    while (cur <= last) { filled.push(cur); cur = addDaysTo(cur, 1); }
    allDays.length = 0;
    filled.forEach(d => allDays.push(d));
  }

  const today = toISO(new Date());

  return <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
    <div style={{ display: "grid", gridTemplateColumns: "90px 1fr 1fr", gap: 8, padding: "8px 12px", borderBottom: "1px solid " + C.border }}>
      <div style={{ fontSize: 11, color: C.sub, fontWeight: 600, textAlign: "center" }}>日付</div>
      <div style={{ fontSize: 11, color: C.sub, fontWeight: 600, display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}><SnsIcon id="x" size={13} /><SnsIcon id="threads" size={13} /><span>19:50</span></div>
      <div style={{ fontSize: 11, color: C.sub, fontWeight: 600, display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}><SnsIcon id="ig" size={13} /><SnsIcon id="tiktok" size={13} /><span>翌日</span></div>
    </div>
    {allDays.map(day => {
      const isToday = day === today, isPast = day < today;
      const epA = groupA[day] || null;
      const epB = groupB[day] || null;

      function renderCell(ep, group) {
        if (!ep) return <div style={{ fontSize: 11, color: C.dim, fontStyle: "italic", padding: "6px 0" }}>{"\u2014"}</div>;
        const isOpen = openId === ep.id;
        const snsIds = group === "a" ? ["x", "threads"] : ["ig", "tiktok"];
        return <div onClick={() => onOpenId(isOpen ? null : ep.id)}
          style={{ padding: "6px 10px", borderRadius: 8, cursor: "pointer", background: isOpen ? C.accent + "15" : "transparent", border: "1px solid " + (isOpen ? C.accent + "44" : "transparent"), transition: "all .15s" }}
          onMouseEnter={e => { if (!isOpen) e.currentTarget.style.background = C.card; }}
          onMouseLeave={e => { if (!isOpen) e.currentTarget.style.background = "transparent"; }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <span style={{ fontSize: 11, color: C.sub }}>#{dn(ep)}</span>
            <span style={{ fontSize: 13, fontWeight: 500, flex: 1 }}>{ep.title || "無題"}</span>
            <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
              {snsIds.map(sid => {
                const sv = (ep.snsState || {})[sid] || "none";
                const stateColor = sv === "posted" ? C.green : sv === "scheduled" ? C.blue : C.dim;
                return <SnsIcon key={sid} id={sid} size={13} color={stateColor} />;
              })}
            </div>
          </div>
        </div>;
      }

      return <div key={day} style={{ display: "grid", gridTemplateColumns: "90px 1fr 1fr", gap: 8, padding: "4px 12px", borderRadius: 8, background: isToday ? C.accentSoft : "transparent", border: isToday ? "1px solid " + C.accent + "33" : "1px solid transparent", opacity: isPast && !epA && !epB ? .4 : 1 }}>
        <div style={{ fontSize: 12, fontWeight: isToday ? 700 : 400, color: isToday ? C.accent : C.sub, paddingTop: 6 }}>
          {fmtDate(day)}
          {isToday && <div style={{ fontSize: 9, color: C.accent }}>TODAY</div>}
        </div>
        {renderCell(epA, "a")}
        {renderCell(epB, "b")}
      </div>;
    })}
  </div>;
}

  useEffect(() => { function h(e) { if (colRef.current && !colRef.current.contains(e.target)) setShowCols(false); } document.addEventListener("mousedown", h); return () => document.removeEventListener("mousedown", h); }, []);

  function toggleCol(id) { if (columns.includes(id)) setColumns(columns.filter(x => x !== id)); else setColumns([...columns, id]); }

      </div>}
    </div>
  </div>;
}

// --- MAIN COMPONENT ---
function MangaDashboard() {
  const [data, setData] = useState(INIT);
  const [loaded, setLoaded] = useState(false);
  const [openId, setOpenId] = useState(null);
  const [adding, setAdding] = useState(false);
  const [editName, setEditName] = useState(false);
  const [tab, setTab] = useState("table");
  const [statusFilter, setStatusFilter] = useState([]);
  const [typeFilter, setTypeFilter] = useState("");
  const [sortKey, setSortKey] = useState(null);
  const [sortDir, setSortDir] = useState("asc");
  const [columns, setColumns] = useState([]);
  const [showSettings, setShowSettings] = useState(false);
  const [confirmReset, setConfirmReset] = useState(false);
  const [deleteMode, setDeleteMode] = useState(false);
  const [deleteSelection, setDeleteSelection] = useState([]);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [gasUrl, setGasUrl] = useState("");
  const [gasStatus, setGasStatus] = useState("");
  const [syncing, setSyncing] = useState(false);
  const settingsRef = useRef(null);
  const importRef = useRef(null);

  useEffect(() => { function h(e) { if (settingsRef.current && !settingsRef.current.contains(e.target)) setShowSettings(false); } document.addEventListener("mousedown", h); return () => document.removeEventListener("mousedown", h); }, []);

  // Load: local first (with migration from old keys), then auto-fetch from GAS
  useEffect(() => { (async () => {
    // Load GAS URL (try new key first, then old)
    let savedGasUrl = "";
    try { let u = await window.storage.get(GAS_URL_KEY); if (!u || !u.value) { u = await window.storage.get("manga-dash-gas-url"); } if (u && u.value) { setGasUrl(u.value); savedGasUrl = u.value; } } catch(e) {}
    // Load local data (unified key first)
    try {
      let r = await window.storage.get(SK);
      if (r && r.value) {
        const parsed = JSON.parse(r.value);
        // Ensure dashboard INIT fields exist
        setData({ ...INIT, ...parsed });
      } else {
        // Migration: try old dashboard key
        let oldR = await window.storage.get(SK_OLD_DASH);
        if (!oldR || !oldR.value) { oldR = await window.storage.get("manga-dash-v11"); }
        if (oldR && oldR.value) {
          const oldData = JSON.parse(oldR.value);
          // Convert numeric IDs to string IDs for compatibility
          if (oldData.episodes) {
            oldData.episodes = oldData.episodes.map(ep => ({
              ...ep,
              id: typeof ep.id === "number" ? "ep_dash_" + ep.id : ep.id,
            }));
          }
          setData({ ...INIT, ...oldData });
          // Save to unified key
          try { await window.storage.set(SK, JSON.stringify({ ...INIT, ...oldData })); } catch(e) {}
        }
      }
    } catch(e) {}
    setLoaded(true);
    // Auto-fetch from GAS (non-blocking, updates after local load)
    if (savedGasUrl) {
      try {
        const remote = await gasGet(savedGasUrl);
        if (remote && remote.episodes) {
          setData({ ...INIT, ...remote });
          try { await window.storage.set(SK, JSON.stringify({ ...INIT, ...remote })); } catch(e) {}
        }
      } catch(e) { /* GAS unavailable — local data is fine */ }
    }
  })(); }, []);

  // Cross-iframe sync: reload when factory saves
  useEffect(() => {
    function onStorage(e) {
      if (e.key === SK && e.newValue) {
        try {
          const d = JSON.parse(e.newValue);
          if (d && d.episodes) { setData({ ...INIT, ...d }); }
        } catch {}
      }
    }
    window.addEventListener("storage", onStorage);
    return () => window.removeEventListener("storage", onStorage);
  }, []);

  // Save: local + GAS (non-blocking)
  const save = useCallback(async d => {
    setData(d);
    try { await window.storage.set(SK, JSON.stringify(d)); } catch(e) {}
    // GAS sync (fire-and-forget)
    try {
      const u = await window.storage.get(GAS_URL_KEY);
      if (u && u.value) gasPost(u.value, d).catch(() => {});
    } catch(e) {}
  }, []);

  async function saveGasUrl(url) {
    setGasUrl(url);
    try { await window.storage.set(GAS_URL_KEY, url); } catch(e) {}
  }

  async function pullFromGas() {
    if (!gasUrl) { setGasStatus("URLが未設定です"); return; }
    setSyncing(true); setGasStatus("");
    try {
      const remote = await gasGet(gasUrl);
      if (remote && remote.episodes) {
        await save(remote);
        setGasStatus("取得完了");
      } else {
        setGasStatus("リモートにデータなし");
      }
    } catch(e) { setGasStatus("取得失敗: " + e.message); }
    setSyncing(false);
  }

  async function pushToGas() {
    if (!gasUrl) { setGasStatus("URLが未設定です"); return; }
    setSyncing(true); setGasStatus("");
    try {
      await gasPost(gasUrl, data);
      setGasStatus("送信完了");
    } catch(e) { setGasStatus("送信失敗: " + e.message); }
    setSyncing(false);
  }

  function exportData() {
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "manga-dashboard-backup-" + toISO(new Date()) + ".json";
    a.click();
    URL.revokeObjectURL(url);
  }

  function handleImport(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const imported = JSON.parse(ev.target.result);
        if (imported && imported.episodes) {
          save(imported);
          setShowSettings(false);
        }
      } catch(err) { console.error("Import failed:", err); }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  function copyDataToClipboard() {
    copyToClip(JSON.stringify(data));
  }
  const eps = data.episodes || [];

  // Display number = order by postDate
  const displayNumMap = {};
  [...eps].sort((a, b) => {
    if (!a.postDate && !b.postDate) return String(a.id).localeCompare(String(b.id));
    if (!a.postDate) return 1;
    if (!b.postDate) return -1;
    return a.postDate.localeCompare(b.postDate) || String(a.id).localeCompare(String(b.id));
  }).forEach((ep, i) => { displayNumMap[ep.id] = i + 1; });
  function dn(ep) { return displayNumMap[ep.id] || "?"; }

  // Type-specific number
  const typeNumMap = {};
  const typeCounters = {};
  [...eps].sort((a, b) => {
    if (!a.postDate && !b.postDate) return String(a.id).localeCompare(String(b.id));
    if (!a.postDate) return 1;
    if (!b.postDate) return -1;
    return a.postDate.localeCompare(b.postDate) || String(a.id).localeCompare(String(b.id));
  }).forEach(ep => {
    const t = ep.postType || "manga";
    typeCounters[t] = (typeCounters[t] || 0) + 1;
    typeNumMap[ep.id] = typeCounters[t];
  });
  function typeNumLabel(ep) {
    const t = ep.postType || "manga";
    const n = typeNumMap[ep.id] || "?";
    if (t === "manga") return "第" + n + "話";
    if (t === "video") return "動画" + n;
    if (t === "illust") return "イラスト" + n;
    return n;
  }

  function addEp(title, date, cadence) {
    const id = "ep" + Date.now();
    const ep = { id, title, postDate: date || "", steps: {}, snsState: {}, captions: {}, story: "", snsMetrics: {}, analyticsNote: "", postType: "manga", postUrls: {}, panels: [], done: {}, seconds: {}, allDone: false };
    save({ ...data, episodes: [...eps, ep], nextId: (data.nextId || eps.length) + 1, defaultCadence: cadence }); setAdding(false);
  }
  function upEp(id, u) { save({ ...data, episodes: eps.map(e => e.id === id ? { ...e, ...u } : e) }); }
  function delEp(id) { save({ ...data, episodes: eps.filter(e => e.id !== id) }); if (openId === id) setOpenId(null); }
  function bulkDelete() {
    if (deleteSelection.length === 0) return;
    save({ ...data, episodes: eps.filter(e => !deleteSelection.includes(e.id)) });
    setDeleteSelection([]); setDeleteMode(false); setConfirmDelete(false);
    if (deleteSelection.includes(openId)) setOpenId(null);
  }
  function toggleDeleteSelect(id) {
    setDeleteSelection(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
  }

  function saveMetrics(epId, snsId, timingKey, vals) {
    const ep = eps.find(e => e.id === epId); if (!ep) return;
    const newMetrics = { ...(ep.snsMetrics || {}) };
    if (!newMetrics[snsId]) newMetrics[snsId] = {};
    newMetrics[snsId][timingKey] = { ...(newMetrics[snsId][timingKey] || {}), ...vals };
    upEp(epId, { snsMetrics: newMetrics });
  }

  function saveFollowers(vals) {
    const entry = { date: toISO(new Date()), ...vals };
    save({ ...data, weeklyFollowers: [...(data.weeklyFollowers || []), entry] });
  }

  function dismissTask(taskKey) {
    save({ ...data, dismissedTasks: [...(data.dismissedTasks || []), taskKey] });
  }

  function cycleSort(key) { if (sortKey === key) { if (sortDir === "asc") setSortDir("desc"); else { setSortKey(null); setSortDir("asc"); } } else { setSortKey(key); setSortDir("asc"); } }

  const today = toISO(new Date());
  const tasks = generateTasks(eps, today, data.weeklyFollowers, data.dismissedTasks, displayNumMap);

  const epsD = eps.map((ep, idx) => ({ ep, idx, status: deriveStatus(ep) }));
  let filtered = epsD;
  if (statusFilter.length > 0) filtered = filtered.filter(x => statusFilter.includes(x.status));
  if (typeFilter) filtered = filtered.filter(x => (x.ep.postType || "manga") === typeFilter);
  const sOrd = { none: 0, plot: 1, storyboard: 2, drawing: 3, done: 4, scheduled: 5, posted: 6 };
  if (sortKey) {
    filtered = [...filtered].sort((a, b) => {
      let cmp = 0;
      if (sortKey === "number") cmp = dn(a.ep) - dn(b.ep);
      else if (sortKey === "title") cmp = (a.ep.title || "").localeCompare(b.ep.title || "", "ja");
      else if (sortKey === "uniqueId") cmp = a.ep.id - b.ep.id;
      else if (sortKey === "typeNum") cmp = (typeNumMap[a.ep.id] || 0) - (typeNumMap[b.ep.id] || 0);
      else if (sortKey === "status") cmp = (sOrd[a.status] || 0) - (sOrd[b.status] || 0);
      else if (sortKey === "date") cmp = (a.ep.postDate || "9").localeCompare(b.ep.postDate || "9");
      return sortDir === "desc" ? -cmp : cmp;
    });
  }

  const counts = { total: eps.length, posted: epsD.filter(e => e.status === "posted").length, wip: epsD.filter(e => ["drawing", "storyboard", "plot"].includes(e.status)).length, ideas: epsD.filter(e => e.status === "none").length };

  if (!loaded) return <div style={{ background: C.bg, minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: C.sub, fontFamily: "'Zen Kaku Gothic New', sans-serif" }}>読み込み中...</div>;

  const tabList = [{ id: "table", label: "📋 一覧" }, { id: "schedule", label: "📅 スケジュール" }, { id: "analytics", label: "📊 アナリティクス" }];

  return <div style={{ background: C.bg, minHeight: "100vh", color: C.text, fontFamily: "'Zen Kaku Gothic New', sans-serif" }}>
    <style>{`@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }`}</style>
    <header style={{ padding: "20px 24px 16px", borderBottom: "1px solid " + C.border, background: "linear-gradient(180deg," + C.surface + " 0%," + C.bg + " 100%)", display: "flex", alignItems: "center", gap: 16, flexWrap: "wrap" }}>
      <div style={{ width: 42, height: 42, borderRadius: 12, background: "linear-gradient(135deg," + C.accent + "," + C.purple + ")", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, boxShadow: "0 4px 24px " + C.accentGlow, flexShrink: 0 }}>🖊️</div>
      <div style={{ flex: 1, minWidth: 180 }}>
        {editName ? <input autoFocus value={data.projectName} onChange={e => save({ ...data, projectName: e.target.value })} onBlur={() => setEditName(false)} onKeyDown={e => { if (e.key === "Enter") setEditName(false); }} style={{ ...inputS, fontSize: 20, fontWeight: 700, fontFamily: "'Zen Kaku Gothic New', sans-serif" }} />
          : <h1 onClick={() => setEditName(true)} style={{ fontFamily: "'Zen Kaku Gothic New', sans-serif", fontSize: 20, margin: 0, cursor: "pointer", letterSpacing: -0.5 }}>{data.projectName}</h1>}
        <div style={{ fontSize: 12, color: C.sub, marginTop: 2 }}>配信管理 v12</div>
      </div>
      <div style={{ display: "flex", gap: 8 }}>
        {[{ n: counts.total, l: "全話", c: C.text }, { n: counts.wip, l: "制作中", c: C.blue }, { n: counts.posted, l: "投稿済", c: C.green }, { n: counts.ideas, l: "未着手", c: C.dim }].map(s =>
          <div key={s.l} style={{ background: C.surface, border: "1px solid " + C.border, borderRadius: 10, padding: "5px 14px", textAlign: "center" }}>
            <div style={{ fontSize: 18, fontWeight: 700, color: s.c, fontFamily: "'Zen Kaku Gothic New', sans-serif" }}>{s.n}</div>
            <div style={{ fontSize: 10, color: C.sub }}>{s.l}</div>
          </div>
        )}
      </div>
    </header>
    <nav style={{ display: "flex", gap: 2, padding: "0 24px", background: C.surface, borderBottom: "1px solid " + C.border }}>
      {tabList.map(t => <button key={t.id} onClick={() => setTab(t.id)} style={{ background: tab === t.id ? C.bg : "transparent", color: tab === t.id ? C.accent : C.sub, border: "none", padding: "12px 18px", cursor: "pointer", fontSize: 13, fontWeight: 500, fontFamily: "inherit", borderBottom: tab === t.id ? "2px solid " + C.accent : "2px solid transparent" }}>{t.label}</button>)}
    </nav>
    <main style={{ padding: "20px 24px", maxWidth: 1200, margin: "0 auto" }}>
      <div style={{ marginBottom: 12, display: "flex", gap: 8, alignItems: "center" }}>
        {adding ? <AddEpisodeBar eps={eps} defaultCadence={data.defaultCadence || "daily"} onAdd={addEp} onCancel={() => setAdding(false)} />
          : <>
            <button onClick={() => setAdding(true)} style={btnS(C.accent)}>＋ 新規エピソード</button>
            {tab === "table" && !deleteMode && <button onClick={() => { setDeleteMode(true); setDeleteSelection([]); }} style={{ ...ghostBtn, fontSize: 12, padding: "8px 14px", color: C.dim }}>🗑 削除モード</button>}
            {tab === "table" && deleteMode && <>
              <button onClick={() => { if (deleteSelection.length > 0) setConfirmDelete(true); }} disabled={deleteSelection.length === 0} style={{ ...btnS(C.red), fontSize: 12, padding: "8px 14px", opacity: deleteSelection.length === 0 ? .4 : 1 }}>🗑 {deleteSelection.length}件を削除</button>
              <button onClick={() => { setDeleteMode(false); setDeleteSelection([]); }} style={{ ...ghostBtn, fontSize: 12, padding: "8px 14px" }}>キャンセル</button>
            </>}
          </>}
      </div>
      {openId && (() => { const ep = eps.find(e => e.id === openId); if (!ep) return null; return <DetailPanel ep={ep} update={u => upEp(openId, u)} onClose={() => setOpenId(null)} onDelete={() => delEp(openId)} allEps={eps} displayNum={dn(ep)} />; })()}

      {tab === "table" && <div>
        <FilterBar statusFilter={statusFilter} setStatusFilter={setStatusFilter} typeFilter={typeFilter} setTypeFilter={setTypeFilter} sortKey={sortKey} setSortKey={setSortKey} sortDir={sortDir} setSortDir={setSortDir} columns={columns} setColumns={setColumns} />
        <div style={{ borderRadius: 14, border: "1px solid " + C.border, overflow: "hidden", background: C.surface, overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
            <thead><tr style={{ background: C.card }}>
              {deleteMode && <th style={{ padding: "10px 8px", textAlign: "center", fontSize: 11, fontWeight: 600, color: C.sub, borderBottom: "1px solid " + C.border, width: 36 }}>
                <input type="checkbox" checked={deleteSelection.length === filtered.length && filtered.length > 0} onChange={e => { if (e.target.checked) setDeleteSelection(filtered.map(x => x.ep.id)); else setDeleteSelection([]); }} style={{ accentColor: C.red }} />
              </th>}
              {[{ label: "#", key: "number" }, { label: "タイトル", key: "title" }].map((h, i) => {
                const active = sortKey === h.key;
                return <th key={i} onClick={() => cycleSort(h.key)} style={{ padding: "10px 8px", textAlign: "center", fontSize: 11, fontWeight: 600, color: active ? C.accent : C.sub, borderBottom: "1px solid " + C.border, cursor: "pointer", userSelect: "none" }}>{h.label}{active ? (sortDir === "asc" ? " ↑" : " ↓") : ""}</th>;
              })}
              {columns.includes("uniqueId") && (() => { const active = sortKey === "uniqueId"; return <th onClick={() => cycleSort("uniqueId")} style={{ padding: "10px 8px", textAlign: "center", fontSize: 11, fontWeight: 600, color: active ? C.accent : C.dim, borderBottom: "1px solid " + C.border, cursor: "pointer", userSelect: "none" }}>ID{active ? (sortDir === "asc" ? " ↑" : " ↓") : ""}</th>; })()}
              {columns.includes("typeNum") && (() => { const active = sortKey === "typeNum"; return <th onClick={() => cycleSort("typeNum")} style={{ padding: "10px 8px", textAlign: "center", fontSize: 11, fontWeight: 600, color: active ? C.accent : C.sub, borderBottom: "1px solid " + C.border, cursor: "pointer", userSelect: "none" }}>話数{active ? (sortDir === "asc" ? " ↑" : " ↓") : ""}</th>; })()}
              {[{ label: "ステータス", key: "status" }, { label: "X配信日", key: "date" }].map(h => {
                const active = sortKey === h.key;
                return <th key={h.label} onClick={() => cycleSort(h.key)} style={{ padding: "10px 8px", textAlign: "center", fontSize: 11, fontWeight: 600, color: active ? C.accent : C.sub, borderBottom: "1px solid " + C.border, cursor: "pointer", userSelect: "none" }}>{h.label}{active ? (sortDir === "asc" ? " ↑" : " ↓") : ""}</th>;
              })}
              {STEPS.map(s => <th key={s.id} style={{ padding: "10px 8px", textAlign: "center", fontSize: 11, fontWeight: 600, color: C.sub, borderBottom: "1px solid " + C.border }}>{s.label}</th>)}
              {SNS_LIST.map(sns => <th key={sns.id} style={{ padding: "10px 8px", textAlign: "center", fontSize: 11, fontWeight: 600, color: sns.color, borderBottom: "1px solid " + C.border }}><SnsIcon id={sns.id} size={16} /></th>)}
            </tr></thead>
            <tbody>
              {filtered.length === 0 ? <tr><td colSpan={99} style={{ padding: 48, textAlign: "center", color: C.dim }}>{eps.length === 0 ? "「＋ 新規エピソード」から追加しましょう！" : "フィルター条件に一致なし"}</td></tr>
              : filtered.map(({ ep, idx, status }) => {
                const isOpen = openId === ep.id;
                const isSelected = deleteSelection.includes(ep.id);
                return <tr key={ep.id} onClick={() => { if (deleteMode) toggleDeleteSelect(ep.id); else setOpenId(isOpen ? null : ep.id); }}
                  style={{ cursor: "pointer", background: isSelected ? "#ff444415" : isOpen ? C.accent + "0A" : "transparent", borderBottom: "1px solid " + C.border + "33" }}
                  onMouseEnter={e => { if (!isOpen && !isSelected) e.currentTarget.style.background = C.card; }}
                  onMouseLeave={e => { if (!isOpen && !isSelected) e.currentTarget.style.background = isSelected ? "#ff444415" : "transparent"; }}>
                  {deleteMode && <td style={cellS} onClick={e => e.stopPropagation()}>
                    <input type="checkbox" checked={isSelected} onChange={() => toggleDeleteSelect(ep.id)} style={{ accentColor: C.red }} />
                  </td>}
                  <td style={cellS}>{dn(ep)}</td>
                  <td style={{ ...cellS, fontWeight: 600 }}>
                    <span style={{ fontSize: 12, marginRight: 4 }}>{(ptMap[ep.postType] || ptMap.manga).icon}</span>
                    {ep.title || "無題"}
                  </td>
                  {columns.includes("uniqueId") && <td style={{ ...cellS, fontSize: 10, color: C.dim, fontFamily: "monospace" }}>{ep.id}</td>}
                  {columns.includes("typeNum") && <td style={{ ...cellS, fontSize: 11, color: (ptMap[ep.postType] || ptMap.manga).color }}>{typeNumLabel(ep)}</td>}
                  <td style={cellS}><StatusPill status={status} /></td>
                  <td style={{ ...cellS, fontSize: 12, color: C.sub }}>{fmtDate(ep.postDate)}</td>
                  {STEPS.map(step => <td key={step.id} style={cellS} onClick={e => e.stopPropagation()}>
                    <Chk on={!!((ep.steps || {})[step.id])} toggle={() => upEp(ep.id, { steps: { ...(ep.steps || {}), [step.id]: !((ep.steps || {})[step.id]) } })} />
                  </td>)}
                  {SNS_LIST.map(sns => <td key={sns.id} style={cellS} onClick={e => e.stopPropagation()}>
                    <SnsStateBtn value={(ep.snsState || {})[sns.id] || "none"} onChange={v => upEp(ep.id, { snsState: { ...(ep.snsState || {}), [sns.id]: v } })} />
                  </td>)}
                </tr>;
              })}
            </tbody>
          </table>
        </div>
      </div>}

      {tab === "schedule" && <div>
        {/* Today's Tasks */}
        {tasks.length > 0 && <div style={{ marginBottom: 20, padding: 16, background: C.card, borderRadius: 14, border: "1px solid " + C.accent + "33" }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: C.accent, marginBottom: 10 }}>📋 今日のタスク（{fmtDate(today)}）</div>
          {tasks.map((task, i) => {
            if (task.type === "followers") return <FollowerInputRow key="fol" onSave={saveFollowers} />;
            return <TaskInputRow key={i} task={task} onSave={saveMetrics} onDismiss={() => dismissTask(task.key)} />;
          })}
        </div>}
        {tasks.length === 0 && <div style={{ marginBottom: 16, padding: 12, background: C.surface, borderRadius: 10, border: "1px solid " + C.border, fontSize: 12, color: C.dim, textAlign: "center" }}>✓ 今日のデータ入力タスクはありません</div>}
        <ScheduleTimeline eps={eps} onOpenId={setOpenId} openId={openId} dn={dn} />
      </div>}

      {tab === "analytics" && <AnalyticsTab eps={eps} data={data} save={save} dn={dn} />}
    </main>
    <footer style={{ textAlign: "center", padding: "20px 0 40px" }}>
      <div style={{ fontSize: 10, color: C.dim }}>v12</div>
    </footer>
    {/* Confirm Reset Modal */}
    {confirmReset && <div style={{ position: "fixed", inset: 0, zIndex: 300, display: "flex", alignItems: "center", justifyContent: "center", background: "rgba(0,0,0,.7)", backdropFilter: "blur(4px)" }} onClick={() => setConfirmReset(false)}>
      <div onClick={e => e.stopPropagation()} style={{ background: C.card, borderRadius: 16, padding: 24, maxWidth: 400, width: "90%", border: "1px solid " + C.red + "44", boxShadow: "0 24px 80px rgba(0,0,0,.6)" }}>
        <div style={{ fontSize: 16, fontWeight: 700, color: C.red, marginBottom: 12 }}>⚠ データリセット</div>
        <div style={{ fontSize: 13, color: C.text, marginBottom: 8 }}>すべてのエピソード・数値データ・週次レビューが完全に削除されます。</div>
        <div style={{ fontSize: 12, color: C.red, marginBottom: 20 }}>この操作は取り消せません。</div>
        <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
          <button onClick={() => setConfirmReset(false)} style={ghostBtn}>キャンセル</button>
          <button onClick={async () => { try { await window.storage.delete(SK); } catch(e){} setData(INIT); setConfirmReset(false); }} style={{ ...btnS(C.red), padding: "8px 24px" }}>リセットする</button>
        </div>
      </div>
    </div>}
    {/* Confirm Delete Modal */}
    {confirmDelete && <div style={{ position: "fixed", inset: 0, zIndex: 300, display: "flex", alignItems: "center", justifyContent: "center", background: "rgba(0,0,0,.7)", backdropFilter: "blur(4px)" }} onClick={() => setConfirmDelete(false)}>
      <div onClick={e => e.stopPropagation()} style={{ background: C.card, borderRadius: 16, padding: 24, maxWidth: 420, width: "90%", border: "1px solid " + C.red + "44", boxShadow: "0 24px 80px rgba(0,0,0,.6)" }}>
        <div style={{ fontSize: 16, fontWeight: 700, color: C.red, marginBottom: 12 }}>🗑 エピソード削除</div>
        <div style={{ fontSize: 13, color: C.text, marginBottom: 8 }}>以下の {deleteSelection.length} 件を削除しますか？</div>
        <div style={{ background: C.bg, borderRadius: 8, padding: 10, marginBottom: 16, maxHeight: 200, overflow: "auto", border: "1px solid " + C.border }}>
          {deleteSelection.map(id => { const ep = eps.find(e => e.id === id); return ep ? <div key={id} style={{ fontSize: 12, color: C.text, padding: "3px 0" }}>#{dn(ep)} {ep.title || "無題"}</div> : null; })}
        </div>
        <div style={{ fontSize: 12, color: C.red, marginBottom: 16 }}>この操作は取り消せません。</div>
        <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
          <button onClick={() => setConfirmDelete(false)} style={ghostBtn}>キャンセル</button>
          <button onClick={bulkDelete} style={{ ...btnS(C.red), padding: "8px 24px" }}>削除する</button>
        </div>
      </div>
    </div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<MangaDashboard />);
</script>
</body>
</html>
